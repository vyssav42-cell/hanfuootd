<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>汉服穿搭手账</title>

<meta name="theme-color" content="#f8f3e9">
<meta name="description" content="记录每日汉服穿搭、衣柜单品和穿着统计的手账 App">

<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon.svg">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="汉服手账">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#e9e1d3;
  font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;
  color:#2b2723;
}
button,input,select,textarea{
  font-family:inherit;
}
.app{
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  background:#f8f3e9;
  position:relative;
  padding-bottom:92px;
}
header{
  padding:32px 18px 14px;
  background:linear-gradient(#f9f4ea,#f4ecdf);
  border-bottom:1px solid #e1d6c4;
  position:sticky;
  top:0;
  z-index:5;
}
.title{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
}
.title h1{
  margin:0;
  font-size:22px;
  letter-spacing:3px;
  font-weight:400;
}
.subtitle{
  font-size:12px;
  color:#8a7f70;
  margin-top:6px;
}
.seal{
  border:1px solid #b56b64;
  color:#b56b64;
  padding:5px 7px;
  font-size:12px;
  writing-mode:vertical-rl;
  letter-spacing:2px;
  border-radius:3px;
}
main{padding:14px}
.card{
  background:#fffaf1;
  border:1px solid #e1d6c4;
  border-radius:16px;
  padding:14px;
  margin-bottom:13px;
  box-shadow:0 5px 14px rgba(102,80,50,.05);
}
.card h2{
  margin:0 0 10px;
  font-size:17px;
  font-weight:500;
  letter-spacing:1px;
}
.muted,.small{
  color:#8f8475;
  font-size:12px;
}
.small{line-height:1.6}
.row{
  display:flex;
  gap:8px;
  align-items:center;
}
.row.between{
  justify-content:space-between;
}
.btn{
  border:0;
  background:#6f8f83;
  color:white;
  padding:9px 13px;
  border-radius:999px;
  font-size:13px;
  margin:4px 4px 4px 0;
  cursor:pointer;
}
.btn.secondary{
  background:#eadfcd;
  color:#5d5246;
}
.btn.danger{
  background:#b86b64;
  color:#fff;
}
.btn.ghost{
  background:transparent;
  border:1px solid #dccdb8;
  color:#756958;
}
.btn:disabled{
  opacity:.55;
}
input,select,textarea{
  width:100%;
  border:1px solid #ddcfba;
  background:#fffdf8;
  border-radius:12px;
  padding:10px;
  margin:6px 0;
  font-size:14px;
}
textarea{
  min-height:68px;
  resize:vertical;
}
.tabs{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  max-width:430px;
  width:100%;
  display:flex;
  background:#f8f3e9;
  border-top:1px solid #ddd0bc;
  padding:8px 0 calc(16px + env(safe-area-inset-bottom));
  z-index:20;
}
.tabs button{
  flex:1;
  border:0;
  background:none;
  color:#9b907f;
  font-size:12px;
  display:flex;
  flex-direction:column;
  gap:3px;
  align-items:center;
  cursor:pointer;
}
.tabs button.active{
  color:#66877a;
  font-weight:600;
}
.icon{
  font-size:17px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:9px;
}
.item{
  border:1px solid #e0d5c3;
  background:#fffdf8;
  border-radius:13px;
  overflow:hidden;
}
.photo{
  width:100%;
  aspect-ratio:1/1;
  background:#eee5d7;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  color:#9a8c79;
  font-size:12px;
}
.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.item-body{
  padding:8px;
}
.item-name{
  font-size:13px;
  margin-bottom:4px;
  line-height:1.35;
  word-break:break-word;
}
.tag{
  display:inline-block;
  padding:2px 6px;
  border-radius:999px;
  background:#edf1ec;
  color:#6f8f83;
  font-size:10px;
  margin-right:3px;
  margin-bottom:3px;
}
.price{
  font-size:12px;
  color:#9a7c5a;
  margin-top:3px;
}
.list-item{
  display:flex;
  gap:10px;
  align-items:center;
  padding:10px 0;
  border-bottom:1px dashed #d8cbb8;
}
.list-thumb{
  width:58px;
  height:58px;
  border-radius:12px;
  overflow:hidden;
  flex-shrink:0;
  background:#eee5d7;
}
.list-main{
  flex:1;
  min-width:0;
}
.list-main .item-name{
  font-size:14px;
}
.toolbar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:10px;
}
.toolbar button{
  margin:0;
}
.ootd{
  border-left:4px solid #8fa99c;
}
.checklist{
  max-height:250px;
  overflow:auto;
  border:1px solid #e2d5c2;
  border-radius:12px;
  padding:8px;
  background:#fffdf8;
  margin:8px 0;
}
.checkline{
  display:flex;
  gap:8px;
  align-items:center;
  padding:7px 2px;
  font-size:14px;
}
.checkline input{
  width:auto;
  margin:0;
}
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}
.day-head,.day{
  text-align:center;
  font-size:12px;
}
.day-head{
  color:#9a8c79;
  padding:5px 0;
}
.day{
  aspect-ratio:1;
  border:1px solid #e0d5c3;
  border-radius:10px;
  background:#fffdf8;
  padding-top:5px;
  position:relative;
  cursor:pointer;
}
.day.has{
  background:#eff4ef;
  border-color:#8fa99c;
}
.day.today{
  outline:2px solid #b86b64;
}
.dot{
  width:6px;
  height:6px;
  background:#b86b64;
  border-radius:50%;
  position:absolute;
  left:50%;
  bottom:6px;
  transform:translateX(-50%);
}
.stat{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.stat-box{
  background:#fffdf8;
  border:1px solid #e0d5c3;
  border-radius:14px;
  padding:13px;
}
.stat-num{
  font-size:22px;
  color:#66877a;
  margin-bottom:4px;
}
.empty{
  text-align:center;
  color:#9b907f;
  padding:24px 10px;
  font-size:13px;
}
hr{
  border:0;
  border-top:1px dashed #d8cbb8;
  margin:12px 0;
}
.pill{
  border:1px solid #ddcfba;
  background:#fffdf8;
  color:#6d6254;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
}
.pill.active{
  background:#6f8f83;
  color:#fff;
  border-color:#6f8f83;
}
.notice{
  background:#f5eadb;
  border:1px dashed #d8c5aa;
  border-radius:12px;
  padding:10px;
  font-size:12px;
  color:#756958;
  line-height:1.6;
}
.preview{
  width:92px;
  height:92px;
  border-radius:14px;
  overflow:hidden;
  background:#eee5d7;
  margin:8px 0;
}
.warning{
  color:#b86b64;
  font-size:12px;
  line-height:1.6;
}
</style>
</head>

<body>
<div class="app">
  <header>
    <div class="title">
      <div>
        <h1>汉服穿搭手账</h1>
        <div class="subtitle" id="todayText"></div>
      </div>
      <div class="seal">衣记</div>
    </div>
  </header>

  <main id="main"></main>

  <nav class="tabs">
    <button onclick="setTab('today')" id="tab-today">
      <span class="icon">✦</span><span>今日</span>
    </button>
    <button onclick="setTab('wardrobe')" id="tab-wardrobe">
      <span class="icon">衣</span><span>衣柜</span>
    </button>
    <button onclick="setTab('calendar')" id="tab-calendar">
      <span class="icon">日</span><span>日历</span>
    </button>
    <button onclick="setTab('stats')" id="tab-stats">
      <span class="icon">算</span><span>统计</span>
    </button>
  </nav>
</div>

<script>
const APP_VERSION = "v2.2-safe-edit";

const $ = id => document.getElementById(id);

const STORAGE_CLOTHES = "hanfu_clothes";
const STORAGE_OOTDS = "hanfu_ootds";
const STORAGE_TAB = "hanfu_tab";
const STORAGE_VIEW = "hanfu_view_mode";

const CATEGORIES = ["外衫","吊带","裙装","外套","鞋履","包袋","其他"];

const nowDate = new Date();
const todayKey = localDateKey(nowDate);

let tab = localStorage.getItem(STORAGE_TAB) || "today";
let viewMode = localStorage.getItem(STORAGE_VIEW) || "list";
let clothes = safeParse(localStorage.getItem(STORAGE_CLOTHES), []);
let ootds = safeParse(localStorage.getItem(STORAGE_OOTDS), []);
let formBackTab = "today";
let editingClothId = null;
let isSaving = false;

let calDate = new Date();
let calYear = calDate.getFullYear();
let calMonth = calDate.getMonth();

normalizeAll();
save();

function safeParse(text, fallback){
  try{
    const v = JSON.parse(text || "");
    return Array.isArray(v) ? v : fallback;
  }catch(e){
    return fallback;
  }
}

function localDateKey(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}

function esc(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function normalizeCat(cat){
  if(cat === "上衣") return "外衫";
  if(cat === "披帛") return "其他";
  if(cat === "披锦") return "其他";
  if(cat === "发饰") return "其他";
  if(CATEGORIES.includes(cat)) return cat;
  return "其他";
}

function normalizeAll(){
  clothes = clothes.map(c => ({
    id: c.id || Date.now() + Math.random(),
    name: c.name || "未命名单品",
    cat: normalizeCat(c.cat),
    price: Number(c.price || 0),
    date: c.date || "",
    shop: c.shop || "",
    note: c.note || "",
    img: c.img || ""
  }));

  ootds = ootds.map(o => ({
    date: o.date || todayKey,
    name: o.name || "今日汉服穿搭",
    occasion: o.occasion || "日常",
    note: o.note || "",
    items: Array.isArray(o.items) ? o.items : [],
    img: o.img || ""
  }));
}

function getStorageSizeMB(){
  let total = 0;
  for(let key in localStorage){
    if(Object.prototype.hasOwnProperty.call(localStorage, key)){
      total += (localStorage.getItem(key) || "").length;
    }
  }
  return (total / 1024 / 1024).toFixed(2);
}

function save(){
  try{
    localStorage.setItem(STORAGE_CLOTHES, JSON.stringify(clothes));
    localStorage.setItem(STORAGE_OOTDS, JSON.stringify(ootds));
    localStorage.setItem(STORAGE_TAB, tab);
    localStorage.setItem(STORAGE_VIEW, viewMode);
    return true;
  }catch(e){
    console.error("保存失败：", e);
    alert(
      "保存失败：浏览器本地空间可能满了。\n\n" +
      "最常见原因是照片太大或照片太多。\n\n" +
      "当前本地数据约：" + getStorageSizeMB() + "MB\n\n" +
      "建议先导出备份，或减少照片。"
    );
    return false;
  }
}

function setTab(t){
  if(isSaving) return;
  tab = t;
  editingClothId = null;
  save();
  render();
}

function setViewMode(mode){
  viewMode = mode;
  save();
  renderWardrobe();
}

function setButtonLoading(id, text){
  const btn = $(id);
  if(btn){
    btn.disabled = true;
    btn.innerText = text || "处理中...";
  }
}

function clearButtonLoading(id, text){
  const btn = $(id);
  if(btn){
    btn.disabled = false;
    btn.innerText = text;
  }
}

/* 图片压缩：把手机大图压成较小 JPEG */
function fileToBase64(file, cb){
  if(!file){
    cb("");
    return;
  }

  if(!file.type.startsWith("image/")){
    alert("请选择图片文件。");
    cb("");
    return;
  }

  const img = new Image();
  const url = URL.createObjectURL(file);

  img.onload = function(){
    URL.revokeObjectURL(url);

    const maxSide = 720;
    let w = img.width;
    let h = img.height;

    if(w > h && w > maxSide){
      h = Math.round(h * maxSide / w);
      w = maxSide;
    }else if(h >= w && h > maxSide){
      w = Math.round(w * maxSide / h);
      h = maxSide;
    }

    const canvas = document.createElement("canvas");
    canvas.width = w;
    canvas.height = h;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0, w, h);

    let quality = 0.72;
    let dataUrl = canvas.toDataURL("image/jpeg", quality);

    while(dataUrl.length > 260 * 1024 && quality > 0.38){
      quality -= 0.08;
      dataUrl = canvas.toDataURL("image/jpeg", quality);
    }

    cb(dataUrl);
  };

  img.onerror = function(){
    URL.revokeObjectURL(url);
    alert("图片读取失败，可以换一张图试试。");
    cb("");
  };

  img.src = url;
}

function formatDate(d){
  return String(d || "").replaceAll("-","/");
}

function getWearCount(id){
  return ootds.filter(o => Array.isArray(o.items) && o.items.includes(id)).length;
}

function render(){
  $("todayText").innerText = "今日 · " + formatDate(todayKey);

  document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
  const active = $("tab-" + tab);
  if(active) active.classList.add("active");

  if(tab === "today") renderToday();
  if(tab === "wardrobe") renderWardrobe();
  if(tab === "calendar") renderCalendar();
  if(tab === "stats") renderStats();
}

/* 今日 */

function renderToday(){
  const todayOotd = ootds.find(o => o.date === todayKey);
  const month = todayKey.slice(0,7);
  const monthDays = ootds.filter(o => o.date.startsWith(month)).length;

  $("main").innerHTML = `
    <div class="card">
      <h2>今日穿搭</h2>
      <div class="notice">记录今天穿了哪一套、搭了哪些单品。以后可以看日历和单品穿着次数。</div>
      <div style="height:10px"></div>
      ${
        todayOotd
        ? renderOotdCard(todayOotd)
        : `<div class="empty">今天还没有记录穿搭</div>`
      }
      <button class="btn" onclick="showOotdForm('${todayKey}','today')">
        ${todayOotd ? "修改今日穿搭" : "记录今天穿什么"}
      </button>
    </div>

    <div class="card">
      <h2>本月小记</h2>
      <div class="stat">
        <div class="stat-box">
          <div class="stat-num">${monthDays}</div>
          <div class="small">本月穿汉服天数</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${ootds.length}</div>
          <div class="small">累计记录天数</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>最近穿搭</h2>
      ${
        ootds.length
        ? ootds.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5).map(o => renderOotdCard(o)).join("")
        : `<div class="empty">还没有穿搭记录</div>`
      }
    </div>
  `;
}

/* 衣柜 */

function renderWardrobe(){
  const selectedCat = sessionStorage.getItem("hanfu_filter_cat") || "全部";
  const keyword = sessionStorage.getItem("hanfu_search") || "";
  const editing = clothes.find(c => c.id === editingClothId);

  const filtered = clothes.filter(c => {
    const okCat = selectedCat === "全部" || c.cat === selectedCat;
    const text = `${c.name} ${c.cat} ${c.shop} ${c.note}`.toLowerCase();
    const okSearch = !keyword || text.includes(keyword.toLowerCase());
    return okCat && okSearch;
  });

  $("main").innerHTML = `
    <div class="card">
      <h2>${editing ? "编辑汉服单品" : "添加汉服单品"}</h2>

      <input id="c-name" placeholder="名称，例如：灰蓝百迭裙 / 白色飞机袖 / 茶色吊带" value="${esc(editing ? editing.name : "")}">

      <select id="c-cat">
        ${CATEGORIES.map(c => `<option ${editing && editing.cat === c ? "selected" : ""}>${c}</option>`).join("")}
      </select>

      <input id="c-price" type="number" placeholder="价格，可不填" value="${editing ? esc(editing.price) : ""}">
      <input id="c-date" type="date" value="${editing ? esc(editing.date) : ""}">
      <input id="c-shop" placeholder="店铺/品牌，可不填" value="${editing ? esc(editing.shop) : ""}">
      <textarea id="c-note" placeholder="备注，比如版型、尺码、是否掉色等，可不填">${editing ? esc(editing.note) : ""}</textarea>

      ${
        editing && editing.img
        ? `
          <div class="small">当前照片：</div>
          <div class="preview photo"><img src="${editing.img}"></div>
          <label class="checkline">
            <input id="c-remove-img" type="checkbox">
            删除当前照片
          </label>
        `
        : ""
      }

      <div class="small">${editing ? "如需替换照片，请选择新图片；不选则保留原照片。" : "选择照片后会自动压缩，避免保存失败。"}</div>
      <input id="c-img" type="file" accept="image/*">

      <button id="cloth-save-btn" class="btn" onclick="saveCloth()">${editing ? "保存修改" : "保存到衣柜"}</button>
      ${
        editing
        ? `<button class="btn secondary" onclick="cancelEditCloth()">取消编辑</button>`
        : ""
      }

      <div class="warning">提示：如果一次添加很多带照片的衣服，建议每添加 3-5 件就去「统计」导出一次备份。</div>
    </div>

    <div class="card">
      <div class="row between">
        <h2 style="margin:0">我的衣柜</h2>
        <div>
          <button class="btn secondary" onclick="setViewMode('grid')">宫格</button>
          <button class="btn secondary" onclick="setViewMode('list')">列表</button>
        </div>
      </div>

      <input
        id="search"
        placeholder="搜索名称、店铺、备注"
        value="${esc(keyword)}"
        oninput="sessionStorage.setItem('hanfu_search', this.value); renderWardrobe();"
      >

      <div class="toolbar">
        ${["全部",...CATEGORIES].map(c => `
          <button class="pill ${selectedCat===c?'active':''}" onclick="setFilterCat('${c}')">${c}</button>
        `).join("")}
      </div>

      <div class="small" style="margin-bottom:8px">
        共 ${clothes.length} 件，当前显示 ${filtered.length} 件 · 当前为 ${viewMode === "grid" ? "宫格模式" : "列表模式"}
      </div>

      ${
        filtered.length
        ? viewMode === "grid"
          ? `<div class="grid">${filtered.map(renderClothGrid).join("")}</div>`
          : `<div>${filtered.map(renderClothList).join("")}</div>`
        : `<div class="empty">没有符合条件的单品</div>`
      }
    </div>
  `;
}

function setFilterCat(cat){
  sessionStorage.setItem("hanfu_filter_cat", cat);
  renderWardrobe();
}

function renderClothGrid(c){
  const count = getWearCount(c.id);
  const cost = count ? Math.round(Number(c.price || 0) / count) : Number(c.price || 0);

  return `
    <div class="item">
      <div class="photo">${c.img ? `<img src="${c.img}">` : "无照片"}</div>
      <div class="item-body">
        <div class="item-name">${esc(c.name)}</div>
        <span class="tag">${esc(c.cat)}</span>
        <div class="price">¥${Number(c.price || 0)}</div>
        <div class="small">穿 ${count} 次</div>
        <div class="small">单次 ¥${cost}</div>
        <button class="btn secondary" style="padding:6px 9px;font-size:12px" onclick="editCloth(${c.id})">编辑</button>
        <button class="btn danger" style="padding:6px 9px;font-size:12px" onclick="deleteCloth(${c.id})">删除</button>
      </div>
    </div>
  `;
}

function renderClothList(c){
  const count = getWearCount(c.id);
  const cost = count ? Math.round(Number(c.price || 0) / count) : Number(c.price || 0);

  return `
    <div class="list-item">
      <div class="list-thumb photo">${c.img ? `<img src="${c.img}">` : ""}</div>
      <div class="list-main">
        <div class="item-name">${esc(c.name)}</div>
        <div>
          <span class="tag">${esc(c.cat)}</span>
          ${c.shop ? `<span class="tag">${esc(c.shop)}</span>` : ""}
        </div>
        <div class="small">¥${Number(c.price || 0)} · 已穿 ${count} 次 · 单次 ¥${cost}</div>
      </div>
      <div>
        <button class="btn secondary" style="padding:7px 10px;font-size:12px" onclick="editCloth(${c.id})">编辑</button>
        <button class="btn danger" style="padding:7px 10px;font-size:12px" onclick="deleteCloth(${c.id})">删</button>
      </div>
    </div>
  `;
}

function editCloth(id){
  editingClothId = id;
  renderWardrobe();
  window.scrollTo({top:0, behavior:"smooth"});
}

function cancelEditCloth(){
  editingClothId = null;
  renderWardrobe();
}

function saveCloth(){
  if(isSaving) return;

  const name = $("c-name").value.trim();

  if(!name){
    alert("先填名称");
    return;
  }

  isSaving = true;
  setButtonLoading("cloth-save-btn", "保存中...");

  const oldClothes = JSON.parse(JSON.stringify(clothes));
  const file = $("c-img").files[0];
  const editing = clothes.find(c => c.id === editingClothId);
  const removeImg = $("c-remove-img") && $("c-remove-img").checked;

  fileToBase64(file, img => {
    let finalImg = "";

    if(editing){
      finalImg = editing.img || "";
      if(removeImg) finalImg = "";
      if(img) finalImg = img;
    }else{
      finalImg = img || "";
    }

    const item = {
      id: editing ? editing.id : Date.now(),
      name,
      cat: normalizeCat($("c-cat").value),
      price: Number($("c-price").value || 0),
      date: $("c-date").value,
      shop: $("c-shop").value.trim(),
      note: $("c-note").value.trim(),
      img: finalImg
    };

    if(editing){
      clothes = clothes.map(c => c.id === editing.id ? item : c);
    }else{
      clothes.push(item);
    }

    if(save()){
      alert(editing ? "修改已保存。" : "已保存到衣柜。");
      editingClothId = null;
      isSaving = false;
      renderWardrobe();
      return;
    }

    if(item.img){
      item.img = "";

      if(editing){
        clothes = clothes.map(c => c.id === item.id ? item : c);
      }else{
        clothes = clothes.map(c => c.id === item.id ? item : c);
      }

      if(save()){
        alert("文字信息已保存，但照片太大/空间不足，所以这次没有保存照片。");
        editingClothId = null;
        isSaving = false;
        renderWardrobe();
        return;
      }
    }

    clothes = oldClothes;
    save();

    alert("这件单品没有保存成功。建议先导出备份，或删除一些大照片后再试。");
    isSaving = false;
    renderWardrobe();
  });
}

function deleteCloth(id){
  if(!confirm("确定删除这件单品吗？相关穿搭记录里也会移除它。")) return;

  const oldClothes = JSON.parse(JSON.stringify(clothes));
  const oldOotds = JSON.parse(JSON.stringify(ootds));

  clothes = clothes.filter(c => c.id !== id);
  ootds = ootds.map(o => ({
    ...o,
    items: o.items.filter(i => i !== id)
  }));

  if(!save()){
    clothes = oldClothes;
    ootds = oldOotds;
    save();
    alert("删除失败，已恢复原数据。");
  }

  if(editingClothId === id) editingClothId = null;
  render();
}

/* 穿搭表单 */

function showOotdForm(date, backTab){
  if(isSaving) return;

  formBackTab = backTab || tab || "today";

  if(clothes.length === 0){
    alert("请先去衣柜添加汉服单品");
    setTab("wardrobe");
    return;
  }

  const old = ootds.find(o => o.date === date);

  $("main").innerHTML = `
    <div class="card">
      <h2>${formatDate(date)} 穿搭记录</h2>

      <input id="o-name" placeholder="整套名字，例如：初夏青绿宋制" value="${esc(old ? old.name : "")}">

      <select id="o-occasion">
        ${["日常","拍照","逛街","茶会","漫展","通勤","聚会","其他"].map(v => `
          <option ${old && old.occasion === v ? "selected" : ""}>${v}</option>
        `).join("")}
      </select>

      <textarea id="o-note" placeholder="今天的穿搭感受、天气、妆造等">${esc(old ? old.note : "")}</textarea>

      <div class="small">选择今天穿了哪些单品：</div>

      <div class="checklist">
        ${clothes.map(c => `
          <label class="checkline">
            <input type="checkbox" value="${c.id}" ${old && old.items.includes(c.id) ? "checked" : ""}>
            <span>${esc(c.name)}</span>
            <span class="tag">${esc(c.cat)}</span>
          </label>
        `).join("")}
      </div>

      ${
        old && old.img
        ? `
          <div class="small">当前穿搭照片：</div>
          <div class="photo" style="margin:10px 0"><img src="${old.img}"></div>
          <label class="checkline">
            <input id="o-remove-img" type="checkbox">
            删除当前穿搭照片
          </label>
        `
        : ""
      }

      <div class="small">选择新照片则会替换原照片；不选则保留原照片。</div>
      <input id="o-img" type="file" accept="image/*">

      <button id="ootd-save-btn" class="btn" onclick="saveOotd('${date}')">保存穿搭</button>
      <button class="btn secondary" onclick="cancelOotdForm()">返回</button>
      ${
        old
        ? `<button class="btn danger" onclick="deleteOotd('${date}')">删除这天记录</button>`
        : ""
      }
    </div>
  `;
}

function cancelOotdForm(){
  if(isSaving) return;
  tab = formBackTab || "today";
  save();
  render();
}

function saveOotd(date){
  if(isSaving) return;

  const selected = Array.from(document.querySelectorAll(".checkline input:checked"))
    .map(i => Number(i.value));

  if(selected.length === 0){
    alert("至少选择一件单品");
    return;
  }

  isSaving = true;
  setButtonLoading("ootd-save-btn", "保存中...");

  const old = ootds.find(o => o.date === date);
  const oldOotds = JSON.parse(JSON.stringify(ootds));
  const file = $("o-img").files[0];
  const removeImg = $("o-remove-img") && $("o-remove-img").checked;

  fileToBase64(file, img => {
    let finalImg = old ? (old.img || "") : "";
    if(removeImg) finalImg = "";
    if(img) finalImg = img;

    const data = {
      date,
      name: $("o-name").value.trim() || "今日汉服穿搭",
      occasion: $("o-occasion").value,
      note: $("o-note").value.trim(),
      items: selected,
      img: finalImg
    };

    ootds = ootds.filter(o => o.date !== date);
    ootds.push(data);

    if(save()){
      tab = formBackTab || "today";
      save();
      isSaving = false;
      render();
      return;
    }

    if(data.img){
      data.img = old ? old.img : "";

      ootds = ootds.filter(o => o.date !== date);
      ootds.push(data);

      if(save()){
        alert("穿搭文字已保存，但新照片太大/空间不足，所以没有保存新照片。");
        tab = formBackTab || "today";
        save();
        isSaving = false;
        render();
        return;
      }
    }

    ootds = oldOotds;
    save();

    alert("这条穿搭没有保存成功。建议先导出备份，或减少照片后再试。");
    tab = formBackTab || "today";
    isSaving = false;
    render();
  });
}

function deleteOotd(date){
  if(!confirm("确定删除这天穿搭记录吗？")) return;

  const oldOotds = JSON.parse(JSON.stringify(ootds));
  ootds = ootds.filter(o => o.date !== date);

  if(!save()){
    ootds = oldOotds;
    save();
    alert("删除失败，已恢复原数据。");
  }

  tab = formBackTab || "today";
  render();
}

function renderOotdCard(o){
  const names = o.items
    .map(id => clothes.find(c => c.id === id)?.name)
    .filter(Boolean);

  return `
    <div class="card ootd" style="margin-bottom:10px;padding:12px">
      <div class="row between">
        <div>
          <div class="item-name">${esc(o.name)}</div>
          <div class="small">${formatDate(o.date)} · ${esc(o.occasion)}</div>
        </div>
        <button class="btn secondary" onclick="showOotdForm('${o.date}','${tab}')">查看</button>
      </div>

      ${o.img ? `<div class="photo" style="margin:10px 0"><img src="${o.img}"></div>` : ""}

      <div class="small">${names.length ? esc(names.join(" + ")) : "没有可显示的单品"}</div>
      ${o.note ? `<div class="small" style="margin-top:5px">“${esc(o.note)}”</div>` : ""}
    </div>
  `;
}

/* 日历 */

function renderCalendar(){
  const first = new Date(calYear, calMonth, 1).getDay();
  const days = new Date(calYear, calMonth + 1, 0).getDate();
  const monthKey = `${calYear}-${String(calMonth+1).padStart(2,"0")}`;

  let cells = "";

  ["日","一","二","三","四","五","六"].forEach(d => {
    cells += `<div class="day-head">${d}</div>`;
  });

  for(let i=0; i<first; i++){
    cells += `<div></div>`;
  }

  for(let d=1; d<=days; d++){
    const key = `${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const has = ootds.some(o => o.date === key);
    const isToday = key === todayKey;

    cells += `
      <div class="day ${has ? "has" : ""} ${isToday ? "today" : ""}" onclick="showOotdForm('${key}','calendar')">
        ${d}
        ${has ? '<div class="dot"></div>' : ''}
      </div>
    `;
  }

  const monthRecords = ootds
    .filter(o => o.date.startsWith(monthKey))
    .sort((a,b) => b.date.localeCompare(a.date));

  $("main").innerHTML = `
    <div class="card">
      <div class="row between">
        <button class="btn secondary" onclick="changeMonth(-1)">‹ 上月</button>
        <h2 style="margin:0">${calYear}年${calMonth + 1}月</h2>
        <button class="btn secondary" onclick="changeMonth(1)">下月 ›</button>
      </div>

      <div style="height:10px"></div>
      <div class="calendar">${cells}</div>

      <div class="small" style="margin-top:12px">
        点击日期可以补记或查看当天穿搭。红圈是今天，有红点表示当天有记录。
      </div>
    </div>

    <div class="card">
      <h2>本月记录</h2>
      ${
        monthRecords.length
        ? monthRecords.map(o => renderOotdCard(o)).join("")
        : `<div class="empty">本月还没有记录</div>`
      }
    </div>
  `;
}

function changeMonth(delta){
  calMonth += delta;

  if(calMonth < 0){
    calMonth = 11;
    calYear--;
  }

  if(calMonth > 11){
    calMonth = 0;
    calYear++;
  }

  renderCalendar();
}

/* 统计和备份 */

function getBackupData(){
  return {
    app: "hanfu-ootd",
    version: APP_VERSION,
    exportedAt: new Date().toISOString(),
    clothes,
    ootds,
    tab
  };
}

function exportBackup(){
  const data = getBackupData();
  const text = JSON.stringify(data, null, 2);
  const blob = new Blob([text], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  const date = new Date().toISOString().slice(0,10);
  const a = document.createElement("a");
  a.href = url;
  a.download = `汉服手账备份-${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
}

async function copyBackup(){
  const text = JSON.stringify(getBackupData(), null, 2);

  try{
    await navigator.clipboard.writeText(text);
    alert("备份内容已复制，可以粘贴到备忘录或文本文件里保存。");
  }catch(e){
    prompt("复制失败，可以手动复制下面的备份内容：", text);
  }
}

function chooseBackupFile(){
  const input = $("backup-file");
  if(input) input.click();
}

function importBackupFile(input){
  const file = input.files && input.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);

      if(!data || !Array.isArray(data.clothes) || !Array.isArray(data.ootds)){
        alert("这个文件不像是汉服手账备份。");
        return;
      }

      const ok = confirm("导入备份会覆盖当前浏览器里的衣柜和穿搭记录。\n\n确定继续吗？");
      if(!ok) return;

      clothes = data.clothes;
      ootds = data.ootds;
      tab = data.tab || "today";

      normalizeAll();

      if(save()){
        alert("导入成功。");
      }else{
        alert("导入失败：备份内容可能太大，当前浏览器存不下。");
      }

      render();

    }catch(err){
      alert("导入失败：备份文件格式不正确。");
    }finally{
      input.value = "";
    }
  };

  reader.readAsText(file, "utf-8");
}

function clearAllData(){
  const first = confirm("确定要清空所有衣柜和穿搭记录吗？这一步不能撤销。");
  if(!first) return;

  const second = confirm("再次确认：真的要删除全部数据吗？建议先导出备份。");
  if(!second) return;

  clothes = [];
  ootds = [];
  tab = "today";
  editingClothId = null;

  save();
  alert("已清空全部数据。");
  render();
}

function renderStats(){
  const totalPrice = clothes.reduce((s,c) => s + Number(c.price || 0), 0);
  const month = todayKey.slice(0,7);
  const monthDays = ootds.filter(o => o.date.startsWith(month)).length;

  const ranked = clothes
    .map(c => ({...c, count:getWearCount(c.id)}))
    .sort((a,b) => b.count - a.count);

  const most = ranked.find(c => c.count > 0);

  $("main").innerHTML = `
    <div class="card">
      <h2>穿搭统计</h2>
      <div class="stat">
        <div class="stat-box">
          <div class="stat-num">${clothes.length}</div>
          <div class="small">衣柜单品</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">¥${totalPrice}</div>
          <div class="small">总花费</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${ootds.length}</div>
          <div class="small">穿搭天数</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${monthDays}</div>
          <div class="small">本月穿汉服天数</div>
        </div>
      </div>

      <hr>

      <div class="small">
        ${most ? `目前最常穿：${esc(most.name)}，已穿 ${most.count} 次。` : "还没有穿搭记录，先从今日开始记一套吧。"}
      </div>
    </div>

    <div class="card">
      <h2>数据备份</h2>
      <div class="notice">
        数据保存在当前浏览器里。换手机、清缓存、换浏览器前，建议先导出备份。
      </div>

      <div style="height:8px"></div>

      <button class="btn" onclick="exportBackup()">导出备份文件</button>
      <button class="btn secondary" onclick="copyBackup()">复制备份文本</button>
      <button class="btn secondary" onclick="chooseBackupFile()">导入备份</button>

      <input
        id="backup-file"
        type="file"
        accept="application/json,.json"
        style="display:none"
        onchange="importBackupFile(this)"
      >

      <hr>

      <div class="small">
        当前版本：${APP_VERSION}<br>
        当前本地数据大小约：${getStorageSizeMB()} MB<br>
        如果接近 4-5MB，建议减少照片或先导出备份。
      </div>

      <button class="btn danger" onclick="clearAllData()">清空全部数据</button>
    </div>

    <div class="card">
      <h2>单品穿着排行</h2>
      ${
        ranked.length
        ? ranked.map(c => {
            const cost = c.count ? Math.round(Number(c.price || 0) / c.count) : Number(c.price || 0);
            return `
              <div style="padding:10px 0;border-bottom:1px dashed #d8cbb8">
                <div class="row between">
                  <div>
                    <div class="item-name">${esc(c.name)}</div>
                    <div class="small">${esc(c.cat)} · 已穿 ${c.count} 次</div>
                  </div>
                  <div class="small">单次 ¥${cost}</div>
                </div>
              </div>
            `;
          }).join("")
        : `<div class="empty">暂无数据</div>`
      }
    </div>

    <div class="card">
      <h2>闲置提醒</h2>
      ${
        ranked.filter(c => c.count === 0).length
        ? ranked.filter(c => c.count === 0).map(c => `<div class="small">· ${esc(c.name)} 还没有穿过</div>`).join("")
        : `<div class="empty">目前没有完全闲置的单品</div>`
      }
    </div>
  `;
}

render();
</script>

<script>
/* 清理旧 PWA 缓存，避免 GitHub Pages 更新后还打开旧代码。
   这不会删除 localStorage 里的衣柜数据。 */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(registrations) {
    registrations.forEach(function(registration) {
      registration.unregister();
    });
  });
}

if ("caches" in window) {
  caches.keys().then(function(keys) {
    keys.forEach(function(key) {
      caches.delete(key);
    });
  });
}
</script>
