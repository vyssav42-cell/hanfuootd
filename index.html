<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>汉服穿搭手账</title>

<meta name="theme-color" content="#f8f3e9">
<meta name="description" content="汉服衣柜与每日穿搭记录">

<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon.svg">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="汉服手账">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
*{box-sizing:border-box}
body{margin:0;background:#e8dfd0;color:#2b2723;font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif}
button,input,select,textarea{font-family:inherit}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:#f8f3e9;padding-bottom:92px}
header{position:sticky;top:0;z-index:5;padding:30px 18px 14px;background:linear-gradient(#fbf6ec,#f4ecdf);border-bottom:1px solid #e0d3bd}
.title{display:flex;justify-content:space-between;align-items:flex-end}
h1{margin:0;font-size:22px;font-weight:400;letter-spacing:3px}
.sub{font-size:12px;color:#8c806f;margin-top:6px}
.seal{border:1px solid #b86b64;color:#b86b64;padding:5px 7px;font-size:12px;writing-mode:vertical-rl;letter-spacing:2px;border-radius:3px}
main{padding:14px}
.card{background:#fffaf1;border:1px solid #e1d6c4;border-radius:16px;padding:14px;margin-bottom:13px;box-shadow:0 5px 14px rgba(102,80,50,.05)}
h2{margin:0 0 10px;font-size:17px;font-weight:500}
.small{font-size:12px;color:#8f8475;line-height:1.6}
.notice{background:#f5eadb;border:1px dashed #d8c5aa;border-radius:12px;padding:10px;font-size:12px;color:#756958;line-height:1.6}
.btn{border:0;background:#6f8f83;color:white;padding:9px 13px;border-radius:999px;font-size:13px;margin:4px 4px 4px 0}
.btn.secondary{background:#eadfcd;color:#5d5246}
.btn.danger{background:#b86b64;color:white}
input,select,textarea{width:100%;border:1px solid #ddcfba;background:#fffdf8;border-radius:12px;padding:10px;margin:6px 0;font-size:14px}
textarea{min-height:66px;resize:vertical}
.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:430px;width:100%;display:flex;background:#f8f3e9;border-top:1px solid #ddd0bc;padding:8px 0 calc(16px + env(safe-area-inset-bottom));z-index:20}
.tabs button{flex:1;border:0;background:none;color:#9b907f;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:3px}
.tabs button.active{color:#66877a;font-weight:600}
.row{display:flex;gap:8px;align-items:center}
.between{justify-content:space-between}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.item{border:1px solid #e0d5c3;background:#fffdf8;border-radius:13px;overflow:hidden}
.photo{width:100%;aspect-ratio:1/1;background:#eee5d7;display:flex;align-items:center;justify-content:center;overflow:hidden;color:#9a8c79;font-size:12px}
.photo img{width:100%;height:100%;object-fit:cover}
.body{padding:8px}
.name{font-size:13px;line-height:1.35;word-break:break-word;margin-bottom:4px}
.tag{display:inline-block;padding:2px 6px;border-radius:999px;background:#edf1ec;color:#6f8f83;font-size:10px;margin-right:3px;margin-bottom:3px}
.list{display:flex;gap:10px;align-items:center;padding:10px 0;border-bottom:1px dashed #d8cbb8}
.thumb{width:58px;height:58px;border-radius:12px;overflow:hidden;flex-shrink:0;background:#eee5d7}
.flex{flex:1;min-width:0}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
.pill{border:1px solid #ddcfba;background:#fffdf8;color:#6d6254;padding:6px 10px;border-radius:999px;font-size:12px}
.pill.active{background:#6f8f83;color:white;border-color:#6f8f83}
.checklist{max-height:250px;overflow:auto;border:1px solid #e2d5c2;border-radius:12px;padding:8px;background:#fffdf8;margin:8px 0}
.check{display:flex;gap:8px;align-items:center;padding:7px 2px;font-size:14px}
.check input{width:auto;margin:0}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.day,.head{text-align:center;font-size:12px}
.head{color:#9a8c79;padding:5px 0}
.day{aspect-ratio:1;border:1px solid #e0d5c3;border-radius:10px;background:#fffdf8;padding-top:5px;position:relative}
.day.has{background:#eff4ef;border-color:#8fa99c}
.day.today{outline:2px solid #b86b64}
.dot{width:6px;height:6px;background:#b86b64;border-radius:50%;position:absolute;left:50%;bottom:6px;transform:translateX(-50%)}
.stat{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.box{background:#fffdf8;border:1px solid #e0d5c3;border-radius:14px;padding:13px}
.num{font-size:22px;color:#66877a}
.empty{text-align:center;color:#9b907f;padding:24px 10px;font-size:13px}
hr{border:0;border-top:1px dashed #d8cbb8;margin:12px 0}
</style>
</head>

<body>
<div class="app">
<header>
  <div class="title">
    <div>
      <h1>汉服穿搭手账</h1>
      <div class="sub" id="todayText"></div>
    </div>
    <div class="seal">衣记</div>
  </div>
</header>

<main id="main"></main>

<nav class="tabs">
  <button id="tab-today" onclick="setTab('today')">✦<span>今日</span></button>
  <button id="tab-wardrobe" onclick="setTab('wardrobe')">衣<span>衣柜</span></button>
  <button id="tab-calendar" onclick="setTab('calendar')">日<span>日历</span></button>
  <button id="tab-stats" onclick="setTab('stats')">算<span>统计</span></button>
</nav>
</div>

<script>
const VERSION="v3-idb-photo";
const CATS=["外衫","吊带","裙装","外套","鞋履","包袋","其他"];
const S_C="hanfu_v3_clothes";
const S_O="hanfu_v3_ootds";
const S_T="hanfu_v3_tab";
const S_V="hanfu_v3_view";
const $=id=>document.getElementById(id);

let tab=localStorage.getItem(S_T)||"today";
let view=localStorage.getItem(S_V)||"list";
let clothes=load(S_C,[]);
let ootds=load(S_O,[]);
let editing=null;
let backTab="today";
let cal=new Date();
let db=null;
let imgCache={};

const today=key(new Date());

function load(k,f){try{return JSON.parse(localStorage.getItem(k)||"")||f}catch{return f}}
function saveMeta(){
  localStorage.setItem(S_C,JSON.stringify(clothes));
  localStorage.setItem(S_O,JSON.stringify(ootds));
  localStorage.setItem(S_T,tab);
  localStorage.setItem(S_V,view);
}
function key(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function esc(s){return String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function cat(c){if(c==="上衣")return"外衫";if(["披帛","披锦","发饰"].includes(c))return"其他";return CATS.includes(c)?c:"其他"}
function fmt(d){return String(d||"").replaceAll("-","/")}
function wear(id){return ootds.filter(o=>o.items&&o.items.includes(id)).length}

function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open("hanfu_photo_db_v3",1);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains("images"))d.createObjectStore("images");
    };
    r.onsuccess=e=>{db=e.target.result;res(db)};
    r.onerror=()=>rej(r.error);
  });
}
function putImg(k,v){
  return new Promise((res,rej)=>{
    const tx=db.transaction("images","readwrite");
    tx.objectStore("images").put(v,k);
    tx.oncomplete=res;tx.onerror=()=>rej(tx.error);
  });
}
function getImg(k){
  if(!k)return Promise.resolve("");
  if(imgCache[k])return Promise.resolve(imgCache[k]);
  return new Promise(res=>{
    const tx=db.transaction("images","readonly");
    const rq=tx.objectStore("images").get(k);
    rq.onsuccess=()=>{imgCache[k]=rq.result||"";res(rq.result||"")};
    rq.onerror=()=>res("");
  });
}
function delImg(k){
  if(!k)return;
  delete imgCache[k];
  const tx=db.transaction("images","readwrite");
  tx.objectStore("images").delete(k);
}
function compress(file){
  return new Promise((res)=>{
    if(!file)return res("");
    if(!file.type.startsWith("image/")){alert("请选择图片文件");return res("")}
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.width,h=img.height,max=900;
      if(w>h&&w>max){h=Math.round(h*max/w);w=max}
      else if(h>=w&&h>max){w=Math.round(w*max/h);h=max}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      let q=.72,data=c.toDataURL("image/jpeg",q);
      while(data.length>350*1024&&q>.4){q-=.08;data=c.toDataURL("image/jpeg",q)}
      res(data);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);alert("图片读取失败");res("")};
    img.src=url;
  });
}

async function imgTag(imgKey,cls=""){
  const data=await getImg(imgKey);
  return data?`<img src="${data}">`:"无照片";
}
async function fillImages(){
  const nodes=[...document.querySelectorAll("[data-imgkey]")];
  for(const n of nodes){
    const k=n.dataset.imgkey;
    const data=await getImg(k);
    n.innerHTML=data?`<img src="${data}">`:"无照片";
  }
}

function setTab(t){tab=t;editing=null;saveMeta();render()}
function setView(v){view=v;saveMeta();renderWardrobe()}
function active(){
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  const b=$("tab-"+tab);if(b)b.classList.add("active");
}

function normalize(){
  clothes=clothes.map(c=>({...c,cat:cat(c.cat),imgKey:c.imgKey||""}));
  ootds=ootds.map(o=>({...o,items:Array.isArray(o.items)?o.items:[],imgKey:o.imgKey||""}));
  saveMeta();
}

function render(){
  $("todayText").innerText="今日 · "+fmt(today);
  active();
  if(tab==="today")renderToday();
  if(tab==="wardrobe")renderWardrobe();
  if(tab==="calendar")renderCalendar();
  if(tab==="stats")renderStats();
}

function renderToday(){
  const o=ootds.find(x=>x.date===today);
  $("main").innerHTML=`
  <div class="card">
    <h2>今日穿搭</h2>
    <div class="notice">新版照片已改存 IndexedDB，不再挤爆 localStorage。</div>
    ${o?ootdCard(o):`<div class="empty">今天还没有记录</div>`}
    <button class="btn" onclick="showOotd('${today}','today')">${o?"修改今日穿搭":"记录今天穿什么"}</button>
  </div>
  <div class="card"><h2>最近穿搭</h2>
    ${ootds.length?ootds.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5).map(ootdCard).join(""):`<div class="empty">暂无记录</div>`}
  </div>`;
  fillImages();
}

function renderWardrobe(){
  const f=sessionStorage.getItem("filter")||"全部";
  const kw=sessionStorage.getItem("kw")||"";
  const e=clothes.find(c=>c.id===editing);
  const arr=clothes.filter(c=>(f==="全部"||c.cat===f)&&(`${c.name} ${c.cat} ${c.shop||""} ${c.note||""}`.toLowerCase().includes(kw.toLowerCase())));
  $("main").innerHTML=`
  <div class="card">
    <h2>${e?"编辑单品":"添加单品"}</h2>
    <input id="c-name" placeholder="名称" value="${esc(e?.name||"")}">
    <select id="c-cat">${CATS.map(x=>`<option ${e?.cat===x?"selected":""}>${x}</option>`).join("")}</select>
    <input id="c-price" type="number" placeholder="价格" value="${esc(e?.price||"")}">
    <input id="c-date" type="date" value="${esc(e?.date||"")}">
    <input id="c-shop" placeholder="店铺/品牌" value="${esc(e?.shop||"")}">
    <textarea id="c-note" placeholder="备注">${esc(e?.note||"")}</textarea>
    ${e?.imgKey?`<div class="small">当前照片：</div><div class="photo" style="width:90px" data-imgkey="${e.imgKey}"></div>
    <label class="check"><input type="checkbox" id="c-del-img">删除当前照片</label>`:""}
    <div class="small">照片会自动压缩并存入 IndexedDB。</div>
    <input id="c-img" type="file" accept="image/*">
    <button class="btn" onclick="saveCloth()">${e?"保存修改":"保存到衣柜"}</button>
    ${e?`<button class="btn secondary" onclick="editing=null;renderWardrobe()">取消</button>`:""}
  </div>

  <div class="card">
    <div class="row between"><h2 style="margin:0">我的衣柜</h2><div>
      <button class="btn secondary" onclick="setView('grid')">宫格</button>
      <button class="btn secondary" onclick="setView('list')">列表</button>
    </div></div>
    <input placeholder="搜索" value="${esc(kw)}" oninput="sessionStorage.setItem('kw',this.value);renderWardrobe()">
    <div class="toolbar">${["全部",...CATS].map(x=>`<button class="pill ${f===x?"active":""}" onclick="sessionStorage.setItem('filter','${x}');renderWardrobe()">${x}</button>`).join("")}</div>
    <div class="small">共 ${clothes.length} 件，显示 ${arr.length} 件</div>
    ${arr.length?(view==="grid"?`<div class="grid">${arr.map(clothGrid).join("")}</div>`:arr.map(clothList).join("")):`<div class="empty">暂无单品</div>`}
  </div>`;
  fillImages();
}

function clothGrid(c){
  return `<div class="item">
    <div class="photo" data-imgkey="${c.imgKey||""}"></div>
    <div class="body"><div class="name">${esc(c.name)}</div><span class="tag">${esc(c.cat)}</span>
    <div class="small">¥${c.price||0} · 穿 ${wear(c.id)} 次</div>
    <button class="btn secondary" onclick="editing=${c.id};renderWardrobe()">编辑</button>
    <button class="btn danger" onclick="delCloth(${c.id})">删</button></div></div>`;
}
function clothList(c){
  return `<div class="list">
    <div class="thumb photo" data-imgkey="${c.imgKey||""}"></div>
    <div class="flex"><div class="name">${esc(c.name)}</div><span class="tag">${esc(c.cat)}</span>
    <div class="small">¥${c.price||0} · 已穿 ${wear(c.id)} 次</div></div>
    <button class="btn secondary" onclick="editing=${c.id};renderWardrobe()">编辑</button>
    <button class="btn danger" onclick="delCloth(${c.id})">删</button>
  </div>`;
}

async function saveCloth(){
  const name=$("c-name").value.trim();
  if(!name)return alert("先填名称");
  const old=clothes.find(c=>c.id===editing);
  let imgKey=old?.imgKey||"";
  if($("c-del-img")?.checked){delImg(imgKey);imgKey=""}
  const file=$("c-img").files[0];
  if(file){
    const data=await compress(file);
    if(data){
      imgKey=imgKey||("cloth_"+Date.now()+"_"+Math.random().toString(16).slice(2));
      await putImg(imgKey,data);
    }
  }
  const item={id:old?.id||Date.now(),name,cat:cat($("c-cat").value),price:Number($("c-price").value||0),date:$("c-date").value,shop:$("c-shop").value.trim(),note:$("c-note").value.trim(),imgKey};
  clothes=old?clothes.map(c=>c.id===old.id?item:c):[...clothes,item];
  editing=null;saveMeta();alert("已保存");renderWardrobe();
}

function delCloth(id){
  if(!confirm("确定删除？"))return;
  const c=clothes.find(x=>x.id===id);if(c?.imgKey)delImg(c.imgKey);
  clothes=clothes.filter(c=>c.id!==id);
  ootds=ootds.map(o=>({...o,items:o.items.filter(x=>x!==id)}));
  saveMeta();render();
}

function showOotd(date,bt){
  backTab=bt||tab;
  if(!clothes.length){alert("请先添加衣服");return setTab("wardrobe")}
  const o=ootds.find(x=>x.date===date);
  $("main").innerHTML=`
  <div class="card">
    <h2>${fmt(date)} 穿搭</h2>
    <input id="o-name" placeholder="整套名字" value="${esc(o?.name||"")}">
    <select id="o-occasion">${["日常","拍照","逛街","茶会","漫展","通勤","聚会","其他"].map(x=>`<option ${o?.occasion===x?"selected":""}>${x}</option>`).join("")}</select>
    <textarea id="o-note" placeholder="备注">${esc(o?.note||"")}</textarea>
    <div class="checklist">${clothes.map(c=>`<label class="check"><input type="checkbox" value="${c.id}" ${o?.items?.includes(c.id)?"checked":""}>${esc(c.name)} <span class="tag">${esc(c.cat)}</span></label>`).join("")}</div>
    ${o?.imgKey?`<div class="photo" data-imgkey="${o.imgKey}" style="margin:8px 0"></div><label class="check"><input type="checkbox" id="o-del-img">删除当前照片</label>`:""}
    <input id="o-img" type="file" accept="image/*">
    <button class="btn" onclick="saveOotd('${date}')">保存穿搭</button>
    <button class="btn secondary" onclick="tab=backTab;saveMeta();render()">返回</button>
    ${o?`<button class="btn danger" onclick="delOotd('${date}')">删除记录</button>`:""}
  </div>`;
  fillImages();
}

async function saveOotd(date){
  const items=[...document.querySelectorAll(".check input:checked")].map(x=>Number(x.value));
  if(!items.length)return alert("至少选择一件单品");
  const old=ootds.find(o=>o.date===date);
  let imgKey=old?.imgKey||"";
  if($("o-del-img")?.checked){delImg(imgKey);imgKey=""}
  const file=$("o-img").files[0];
  if(file){
    const data=await compress(file);
    if(data){imgKey=imgKey||("ootd_"+Date.now()+"_"+Math.random().toString(16).slice(2));await putImg(imgKey,data)}
  }
  const o={date,name:$("o-name").value.trim()||"今日汉服穿搭",occasion:$("o-occasion").value,note:$("o-note").value.trim(),items,imgKey};
  ootds=ootds.filter(x=>x.date!==date);ootds.push(o);
  tab=backTab;saveMeta();render();
}
function delOotd(date){
  if(!confirm("删除这天记录？"))return;
  const o=ootds.find(x=>x.date===date);if(o?.imgKey)delImg(o.imgKey);
  ootds=ootds.filter(x=>x.date!==date);saveMeta();tab=backTab;render();
}
function ootdCard(o){
  const names=o.items.map(id=>clothes.find(c=>c.id===id)?.name).filter(Boolean).join(" + ");
  return `<div class="card" style="border-left:4px solid #8fa99c;padding:12px">
    <div class="row between"><div><div class="name">${esc(o.name)}</div><div class="small">${fmt(o.date)} · ${esc(o.occasion)}</div></div>
    <button class="btn secondary" onclick="showOotd('${o.date}','${tab}')">查看</button></div>
    ${o.imgKey?`<div class="photo" data-imgkey="${o.imgKey}" style="margin:8px 0"></div>`:""}
    <div class="small">${esc(names||"无单品")}</div>${o.note?`<div class="small">“${esc(o.note)}”</div>`:""}</div>`;
}

function renderCalendar(){
  const y=cal.getFullYear(),m=cal.getMonth(),first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  const mk=`${y}-${String(m+1).padStart(2,"0")}`;
  let html=["日","一","二","三","四","五","六"].map(d=>`<div class="head">${d}</div>`).join("");
  for(let i=0;i<first;i++)html+="<div></div>";
  for(let d=1;d<=days;d++){
    const k=`${mk}-${String(d).padStart(2,"0")}`,has=ootds.some(o=>o.date===k);
    html+=`<div class="day ${has?"has":""} ${k===today?"today":""}" onclick="showOotd('${k}','calendar')">${d}${has?'<div class="dot"></div>':""}</div>`;
  }
  const rec=ootds.filter(o=>o.date.startsWith(mk)).sort((a,b)=>b.date.localeCompare(a.date));
  $("main").innerHTML=`<div class="card"><div class="row between">
    <button class="btn secondary" onclick="cal.setMonth(cal.getMonth()-1);renderCalendar()">‹ 上月</button>
    <h2 style="margin:0">${y}年${m+1}月</h2>
    <button class="btn secondary" onclick="cal.setMonth(cal.getMonth()+1);renderCalendar()">下月 ›</button>
  </div><div style="height:10px"></div><div class="calendar">${html}</div></div>
  <div class="card"><h2>本月记录</h2>${rec.length?rec.map(ootdCard).join(""):`<div class="empty">本月暂无记录</div>`}</div>`;
  fillImages();
}

function exportBackup(){
  const data={app:"hanfu-ootd",version:VERSION,exportedAt:new Date().toISOString(),clothes,ootds};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="汉服手账文字备份-"+today+".json";a.click();
}
function importBackup(e){
  const f=e.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!Array.isArray(d.clothes)||!Array.isArray(d.ootds))throw 0;
      if(!confirm("导入会覆盖当前文字资料，照片不会从备份恢复。继续？"))return;
      clothes=d.clothes;ootds=d.ootds;normalize();render();
    }catch{alert("备份格式不对")}
  };
  r.readAsText(f);
}

function renderStats(){
  const total=clothes.reduce((s,c)=>s+Number(c.price||0),0);
  const ranked=clothes.map(c=>({...c,count:wear(c.id)})).sort((a,b)=>b.count-a.count);
  $("main").innerHTML=`
  <div class="card"><h2>统计</h2><div class="stat">
    <div class="box"><div class="num">${clothes.length}</div><div class="small">衣柜单品</div></div>
    <div class="box"><div class="num">¥${total}</div><div class="small">总花费</div></div>
    <div class="box"><div class="num">${ootds.length}</div><div class="small">穿搭天数</div></div>
    <div class="box"><div class="num">${VERSION}</div><div class="small">当前版本</div></div>
  </div></div>
  <div class="card"><h2>备份</h2>
    <div class="notice">当前版本照片存在 IndexedDB。这里的备份先导出文字资料；照片仍保存在本机浏览器里。</div>
    <button class="btn" onclick="exportBackup()">导出文字备份</button>
    <input type="file" accept=".json,application/json" onchange="importBackup(this)">
  </div>
  <div class="card"><h2>单品穿着排行</h2>
    ${ranked.length?ranked.map(c=>`<div style="padding:9px 0;border-bottom:1px dashed #d8cbb8"><div class="row between"><div><div class="name">${esc(c.name)}</div><div class="small">${esc(c.cat)} · 已穿 ${c.count} 次</div></div><div class="small">单次 ¥${c.count?Math.round((c.price||0)/c.count):(c.price||0)}</div></div></div>`).join(""):`<div class="empty">暂无数据</div>`}
  </div>`;
}

(async function init(){
  await openDB();
  normalize();
  render();
})();
</script>

<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister()));
}
if("caches" in window){
  caches.keys().then(keys=>keys.forEach(k=>caches.delete(k)));
}
</script>
</body>
</html>
