<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>汉服穿搭手账</title>

<meta name="theme-color" content="#f8f3e9">
<meta name="description" content="汉服衣柜、搭配与每日穿搭记录">

<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon.svg">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="汉服手账">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#e8dfd0;
  color:#2b2723;
  font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;
}
button,input,select,textarea{font-family:inherit}
button{cursor:pointer}
.app{
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  background:#f8f3e9;
  padding-bottom:96px;
}
header{
  position:sticky;
  top:0;
  z-index:5;
  padding:30px 18px 14px;
  background:linear-gradient(#fbf6ec,#f4ecdf);
  border-bottom:1px solid #e0d3bd;
}
.title{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
}
h1{
  margin:0;
  font-size:22px;
  font-weight:400;
  letter-spacing:3px;
}
.sub{
  font-size:12px;
  color:#8c806f;
  margin-top:6px;
}
.seal{
  border:1px solid #b86b64;
  color:#b86b64;
  padding:5px 7px;
  font-size:12px;
  writing-mode:vertical-rl;
  letter-spacing:2px;
  border-radius:3px;
}
main{padding:14px}
.card{
  background:#fffaf1;
  border:1px solid #e1d6c4;
  border-radius:16px;
  padding:14px;
  margin-bottom:13px;
  box-shadow:0 5px 14px rgba(102,80,50,.05);
}
h2{
  margin:0 0 10px;
  font-size:17px;
  font-weight:500;
}
h3{
  margin:0 0 8px;
  font-size:14px;
  font-weight:500;
}
.small{
  font-size:12px;
  color:#8f8475;
  line-height:1.6;
}
.notice{
  background:#f5eadb;
  border:1px dashed #d8c5aa;
  border-radius:12px;
  padding:10px;
  font-size:12px;
  color:#756958;
  line-height:1.6;
}
.btn{
  border:0;
  background:#6f8f83;
  color:white;
  padding:9px 13px;
  border-radius:999px;
  font-size:13px;
  margin:4px 4px 4px 0;
}
.btn.secondary{
  background:#eadfcd;
  color:#5d5246;
}
.btn.danger{
  background:#b86b64;
  color:white;
}
.btn.ghost{
  background:#fffdf8;
  color:#6d6254;
  border:1px solid #ddcfba;
}
input,select,textarea{
  width:100%;
  border:1px solid #ddcfba;
  background:#fffdf8;
  border-radius:12px;
  padding:10px;
  margin:6px 0;
  font-size:14px;
}
textarea{
  min-height:66px;
  resize:vertical;
}
.tabs{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  max-width:430px;
  width:100%;
  display:flex;
  background:#f8f3e9;
  border-top:1px solid #ddd0bc;
  padding:8px 0 calc(16px + env(safe-area-inset-bottom));
  z-index:20;
}
.tabs button{
  flex:1;
  border:0;
  background:none;
  color:#9b907f;
  font-size:11px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
}
.tabs button.active{
  color:#66877a;
  font-weight:600;
}
.navicon{font-size:16px}
.row{
  display:flex;
  gap:8px;
  align-items:center;
}
.between{justify-content:space-between}
.flex{flex:1;min-width:0}
.photo{
  width:100%;
  aspect-ratio:1/1;
  background:#eee5d7;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  color:#9a8c79;
  font-size:12px;
}
.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.hero{
  border-radius:18px;
  overflow:hidden;
  background:#eee5d7;
  min-height:230px;
}
.hero .photo{
  aspect-ratio:4/5;
}
.hero-info{
  padding:12px;
  background:#fffdf8;
}
.name{
  font-size:14px;
  line-height:1.35;
  word-break:break-word;
  margin-bottom:4px;
}
.big-name{
  font-size:18px;
  margin-bottom:5px;
}
.tag{
  display:inline-block;
  padding:2px 6px;
  border-radius:999px;
  background:#edf1ec;
  color:#6f8f83;
  font-size:10px;
  margin-right:3px;
  margin-bottom:3px;
}
.toolbar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin:8px 0;
}
.pill{
  border:1px solid #ddcfba;
  background:#fffdf8;
  color:#6d6254;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
}
.pill.active{
  background:#6f8f83;
  color:white;
  border-color:#6f8f83;
}
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:7px;
}
.item{
  border:1px solid #e0d5c3;
  background:#fffdf8;
  border-radius:12px;
  overflow:hidden;
}
.item .body{
  padding:6px;
}
.item .name{
  font-size:11px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.item .tag{
  font-size:9px;
  padding:1px 5px;
}
.item .btn{
  padding:4px 6px;
  font-size:10px;
  margin:2px 2px 0 0;
}
.list{
  display:flex;
  gap:10px;
  align-items:center;
  padding:10px 0;
  border-bottom:1px dashed #d8cbb8;
}
.thumb{
  width:58px;
  height:58px;
  border-radius:12px;
  overflow:hidden;
  flex-shrink:0;
  background:#eee5d7;
}
.checklist{
  max-height:330px;
  overflow:auto;
  border:1px solid #e2d5c2;
  border-radius:12px;
  padding:8px;
  background:#fffdf8;
  margin:8px 0;
}
details{
  border:1px solid #eadcca;
  background:#fffdf8;
  border-radius:12px;
  padding:8px 10px;
  margin:8px 0;
}
summary{
  font-size:14px;
  color:#5d5246;
  cursor:pointer;
}
.check{
  display:flex;
  gap:8px;
  align-items:center;
  padding:7px 2px;
  font-size:14px;
}
.check input{
  width:auto;
  margin:0;
}
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}
.head{
  text-align:center;
  font-size:11px;
  color:#9a8c79;
  padding:4px 0;
}
.day{
  min-height:64px;
  border:1px solid #e0d5c3;
  border-radius:10px;
  background:#fffdf8;
  overflow:hidden;
  position:relative;
  font-size:11px;
}
.day.today{
  outline:2px solid #b86b64;
}
.day-num{
  position:absolute;
  top:4px;
  left:5px;
  z-index:2;
  background:#fffaf1cc;
  border-radius:999px;
  padding:1px 5px;
  color:#5d5246;
}
.day-img{
  width:100%;
  height:100%;
  min-height:64px;
  background:#f1eadf;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#9a8c79;
  font-size:10px;
}
.day-img img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.day.has{
  border-color:#8fa99c;
}
.stat{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.box{
  background:#fffdf8;
  border:1px solid #e0d5c3;
  border-radius:14px;
  padding:13px;
}
.num{
  font-size:22px;
  color:#66877a;
}
.empty{
  text-align:center;
  color:#9b907f;
  padding:24px 10px;
  font-size:13px;
}
hr{
  border:0;
  border-top:1px dashed #d8cbb8;
  margin:12px 0;
}
.outfit-card{
  border:1px solid #e0d5c3;
  background:#fffdf8;
  border-radius:14px;
  overflow:hidden;
  margin-bottom:10px;
}
.outfit-body{
  padding:10px;
}
.version{
  text-align:center;
  font-size:10px;
  color:#b0a493;
  padding:10px 0 2px;
}
</style>
</head>

<body>
<div class="app">
<header>
  <div class="title">
    <div>
      <h1>汉服穿搭手账</h1>
      <div class="sub" id="todayText"></div>
    </div>
    <div class="seal">衣记</div>
  </div>
</header>

<main id="main"></main>

<nav class="tabs">
  <button id="tab-today" onclick="setTab('today')"><span class="navicon">✦</span><span>今日</span></button>
  <button id="tab-wardrobe" onclick="setTab('wardrobe')"><span class="navicon">衣</span><span>衣柜</span></button>
  <button id="tab-outfits" onclick="setTab('outfits')"><span class="navicon">搭</span><span>搭配</span></button>
  <button id="tab-calendar" onclick="setTab('calendar')"><span class="navicon">日</span><span>日历</span></button>
  <button id="tab-stats" onclick="setTab('stats')"><span class="navicon">算</span><span>统计</span></button>
</nav>
</div>

<script>
const VERSION = "v4-final";
const CATS = ["外衫","上衣","吊带","裙装","其他"];
const OCCASIONS = ["上班","出游","看电影","其他"];

const S_C = "hanfu_v4_clothes";
const S_O = "hanfu_v4_ootds";
const S_F = "hanfu_v4_outfits";
const S_T = "hanfu_v4_tab";
const S_V = "hanfu_v4_view";

const LEGACY_C = ["hanfu_v3_clothes","hanfu_clothes"];
const LEGACY_O = ["hanfu_v3_ootds","hanfu_ootds"];

const $ = id => document.getElementById(id);

let db = null;
let imgCache = {};

let clothes = [];
let ootds = [];
let outfits = [];
let tab = localStorage.getItem(S_T) || "today";
let view = localStorage.getItem(S_V) || "grid";
let editingCloth = null;
let editingOutfit = null;
let backTab = "today";
let cal = new Date();

const today = dateKey(new Date());

function dateKey(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function esc(s){
  return String(s??"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function fmt(d){return String(d||"").replaceAll("-","/")}
function safeParse(text,fallback){
  try{
    const v = JSON.parse(text || "");
    return v || fallback;
  }catch(e){
    return fallback;
  }
}
function readFirst(keys,fallback){
  for(const k of keys){
    const raw = localStorage.getItem(k);
    if(raw){
      const val = safeParse(raw,null);
      if(Array.isArray(val) && val.length) return val;
    }
  }
  return fallback;
}
function normalizeCat(c){
  if(c === "外套") return "上衣";
  if(c === "上衣") return "上衣";
  if(c === "外衫") return "外衫";
  if(c === "吊带") return "吊带";
  if(c === "裙装") return "裙装";
  if(["鞋履","包袋","披帛","披锦","发饰"].includes(c)) return "其他";
  if(CATS.includes(c)) return c;
  return "其他";
}
function wearCount(id){
  return ootds.filter(o => Array.isArray(o.items) && o.items.includes(id)).length;
}
function getCloth(id){
  return clothes.find(c => c.id === id);
}
function getOutfit(id){
  return outfits.find(o => o.id === id);
}
function saveMeta(){
  localStorage.setItem(S_C, JSON.stringify(clothes));
  localStorage.setItem(S_O, JSON.stringify(ootds));
  localStorage.setItem(S_F, JSON.stringify(outfits));
  localStorage.setItem(S_T, tab);
  localStorage.setItem(S_V, view);
}
function activeTab(){
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  const b = $("tab-" + tab);
  if(b) b.classList.add("active");
}
function setTab(t){
  tab = t;
  editingCloth = null;
  editingOutfit = null;
  saveMeta();
  render();
}
function setView(v){
  view = v;
  saveMeta();
  renderWardrobe();
}

/* IndexedDB 图片 */
function openDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open("hanfu_photo_db_v4",1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains("images")) d.createObjectStore("images");
    };
    req.onsuccess = e => {
      db = e.target.result;
      resolve(db);
    };
    req.onerror = () => reject(req.error);
  });
}
function putImg(key,data){
  if(!key || !data) return Promise.resolve();
  imgCache[key] = data;
  return new Promise((resolve,reject)=>{
    const tx = db.transaction("images","readwrite");
    tx.objectStore("images").put(data,key);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}
function getImg(key){
  if(!key) return Promise.resolve("");
  if(imgCache[key]) return Promise.resolve(imgCache[key]);
  return new Promise(resolve=>{
    const tx = db.transaction("images","readonly");
    const req = tx.objectStore("images").get(key);
    req.onsuccess = () => {
      const val = req.result || "";
      if(val) imgCache[key] = val;
      resolve(val);
    };
    req.onerror = () => resolve("");
  });
}
function delImg(key){
  if(!key || !db) return;
  delete imgCache[key];
  const tx = db.transaction("images","readwrite");
  tx.objectStore("images").delete(key);
}
function getAllImageKeys(){
  const keys = new Set();
  clothes.forEach(c => c.imgKey && keys.add(c.imgKey));
  ootds.forEach(o => o.imgKey && keys.add(o.imgKey));
  outfits.forEach(o => o.imgKey && keys.add(o.imgKey));
  return [...keys];
}
async function fillImages(){
  const nodes = [...document.querySelectorAll("[data-imgkey]")];
  for(const node of nodes){
    const k = node.dataset.imgkey;
    const data = await getImg(k);
    node.innerHTML = data ? `<img src="${data}">` : "无照片";
  }
}
async function fillCalendarImages(){
  const nodes = [...document.querySelectorAll("[data-calimg]")];
  for(const node of nodes){
    const k = node.dataset.calimg;
    const data = await getImg(k);
    if(data) node.innerHTML = `<img src="${data}">`;
  }
}
function compressImage(file){
  return new Promise(resolve=>{
    if(!file) return resolve("");
    if(!file.type.startsWith("image/")){
      alert("请选择图片文件");
      return resolve("");
    }
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.width;
      let h = img.height;
      const max = 1100;
      if(w > h && w > max){
        h = Math.round(h * max / w);
        w = max;
      }else if(h >= w && h > max){
        w = Math.round(w * max / h);
        h = max;
      }
      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      let q = 0.76;
      let data = canvas.toDataURL("image/jpeg",q);
      while(data.length > 480 * 1024 && q > 0.42){
        q -= 0.08;
        data = canvas.toDataURL("image/jpeg",q);
      }
      resolve(data);
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      alert("图片读取失败");
      resolve("");
    };
    img.src = url;
  });
}

/* 初始化与迁移 */
async function migrateInlineImages(){
  let changed = false;

  for(const c of clothes){
    if(c.img && String(c.img).startsWith("data:image")){
      const key = c.imgKey || `cloth_${c.id}_${Date.now()}`;
      await putImg(key,c.img);
      c.imgKey = key;
      delete c.img;
      changed = true;
    }
  }

  for(const o of ootds){
    if(o.img && String(o.img).startsWith("data:image")){
      const key = o.imgKey || `ootd_${o.date}_${Date.now()}`;
      await putImg(key,o.img);
      o.imgKey = key;
      delete o.img;
      changed = true;
    }
  }

  for(const o of outfits){
    if(o.img && String(o.img).startsWith("data:image")){
      const key = o.imgKey || `outfit_${o.id}_${Date.now()}`;
      await putImg(key,o.img);
      o.imgKey = key;
      delete o.img;
      changed = true;
    }
  }

  if(changed) saveMeta();
}
function normalizeAll(){
  clothes = clothes.map(c => ({
    id: c.id || Date.now() + Math.random(),
    name: c.name || "未命名单品",
    cat: normalizeCat(c.cat),
    price: Number(c.price || 0),
    date: c.date || "",
    shop: c.shop || "",
    note: c.note || "",
    imgKey: c.imgKey || "",
    img: c.img || ""
  }));

  ootds = ootds.map(o => ({
    date: o.date || today,
    name: o.name || "今日汉服穿搭",
    occasion: OCCASIONS.includes(o.occasion) ? o.occasion : "其他",
    note: o.note || "",
    items: Array.isArray(o.items) ? o.items : [],
    imgKey: o.imgKey || "",
    img: o.img || "",
    outfitId: o.outfitId || null
  }));

  outfits = outfits.map(o => ({
    id: o.id || Date.now() + Math.random(),
    name: o.name || "未命名搭配",
    items: Array.isArray(o.items) ? o.items : [],
    note: o.note || "",
    imgKey: o.imgKey || "",
    img: o.img || ""
  }));
}

/* 通用渲染 */
function render(){
  $("todayText").innerText = "今日 · " + fmt(today);
  activeTab();
  if(tab === "today") renderToday();
  if(tab === "wardrobe") renderWardrobe();
  if(tab === "outfits") renderOutfits();
  if(tab === "calendar") renderCalendar();
  if(tab === "stats") renderStats();
}
function itemNames(ids){
  return ids.map(id => getCloth(id)?.name).filter(Boolean);
}
function categoryDetails(selectedIds=[]){
  return CATS.map(cat => {
    const arr = clothes.filter(c => c.cat === cat);
    if(!arr.length) return "";
    return `
      <details ${cat==="外衫"||cat==="上衣"||cat==="裙装" ? "open" : ""}>
        <summary>${cat} · ${arr.length}件</summary>
        ${arr.map(c => `
          <label class="check">
            <input type="checkbox" value="${c.id}" ${selectedIds.includes(c.id) ? "checked" : ""}>
            <span>${esc(c.name)}</span>
          </label>
        `).join("")}
      </details>
    `;
  }).join("");
}

/* 今日 */
function renderToday(){
  const todayOotd = ootds.find(o => o.date === today);
  const month = today.slice(0,7);
  const monthDays = ootds.filter(o => o.date.startsWith(month)).length;

  $("main").innerHTML = `
    <div class="card">
      <h2>今日穿搭</h2>
      ${
        todayOotd
        ? todayHero(todayOotd)
        : `
          <div class="hero">
            <div class="photo" style="aspect-ratio:4/5;background:linear-gradient(145deg,#efe4d4,#dfe9e1);">
              今日还没有记录
            </div>
            <div class="hero-info">
              <div class="big-name">今天穿什么？</div>
              <div class="small">记录今天的汉服、场合和搭配感受。</div>
            </div>
          </div>
        `
      }
      <div style="height:10px"></div>
      <button class="btn" onclick="showOotdForm('${today}','today')">
        ${todayOotd ? "修改今日穿搭" : "记录今天穿什么"}
      </button>
      <button class="btn secondary" onclick="chooseOutfitForToday()">从套装搭配选择</button>
    </div>

    <div class="card">
      <h2>本月小记</h2>
      <div class="stat">
        <div class="box">
          <div class="num">${monthDays}</div>
          <div class="small">本月穿汉服天数</div>
        </div>
        <div class="box">
          <div class="num">${ootds.length}</div>
          <div class="small">累计记录天数</div>
        </div>
      </div>
    </div>
  `;
  fillImages();
}
function todayHero(o){
  const names = itemNames(o.items);
  return `
    <div class="hero">
      <div class="photo" data-imgkey="${o.imgKey || ""}" style="aspect-ratio:4/5;">
        ${o.imgKey ? "" : "无照片"}
      </div>
      <div class="hero-info">
        <div class="big-name">${esc(o.name)}</div>
        <div>
          <span class="tag">${esc(o.occasion)}</span>
        </div>
        <div class="small">${esc(names.join(" + ") || "未显示单品")}</div>
        ${o.note ? `<div class="small" style="margin-top:5px">“${esc(o.note)}”</div>` : ""}
      </div>
    </div>
  `;
}
function chooseOutfitForToday(){
  if(!outfits.length){
    alert("还没有保存套装搭配，先去「搭配」里创建一个吧。");
    setTab("outfits");
    return;
  }
  $("main").innerHTML = `
    <div class="card">
      <h2>选择一个套装</h2>
      ${outfits.map(o => `
        <div class="outfit-card">
          <div class="photo" data-imgkey="${o.imgKey || ""}"></div>
          <div class="outfit-body">
            <div class="name">${esc(o.name)}</div>
            <div class="small">${esc(itemNames(o.items).join(" + ") || "无单品")}</div>
            <button class="btn" onclick="useOutfitToday(${o.id})">用于今日穿搭</button>
          </div>
        </div>
      `).join("")}
      <button class="btn secondary" onclick="renderToday()">返回</button>
    </div>
  `;
  fillImages();
}
function useOutfitToday(id){
  const outfit = getOutfit(id);
  if(!outfit) return;
  const old = ootds.find(o => o.date === today);
  const data = {
    date: today,
    name: outfit.name,
    occasion: old?.occasion || "其他",
    note: old?.note || outfit.note || "",
    items: [...outfit.items],
    imgKey: old?.imgKey || outfit.imgKey || "",
    outfitId: outfit.id
  };
  ootds = ootds.filter(o => o.date !== today);
  ootds.push(data);
  tab = "today";
  saveMeta();
  render();
}

/* 衣柜 */
function renderWardrobe(){
  const filter = sessionStorage.getItem("filter_cat") || "全部";
  const kw = sessionStorage.getItem("kw") || "";
  const edit = clothes.find(c => c.id === editingCloth);

  const list = clothes.filter(c => {
    const okCat = filter === "全部" || c.cat === filter;
    const text = `${c.name} ${c.cat} ${c.shop||""} ${c.note||""}`.toLowerCase();
    return okCat && text.includes(kw.toLowerCase());
  });

  $("main").innerHTML = `
    <div class="card">
      <h2>${edit ? "编辑单品" : "添加单品"}</h2>
      <input id="c-name" placeholder="名称" value="${esc(edit?.name || "")}">
      <select id="c-cat">
        ${CATS.map(c => `<option ${edit?.cat===c ? "selected" : ""}>${c}</option>`).join("")}
      </select>
      <input id="c-price" type="number" placeholder="价格" value="${esc(edit?.price || "")}">
      <input id="c-date" type="date" value="${esc(edit?.date || "")}">
      <input id="c-shop" placeholder="店铺/品牌，可不填" value="${esc(edit?.shop || "")}">
      <textarea id="c-note" placeholder="备注，可不填">${esc(edit?.note || "")}</textarea>

      ${
        edit?.imgKey
        ? `
          <div class="small">当前照片：</div>
          <div class="photo" data-imgkey="${edit.imgKey}" style="width:90px;border-radius:12px"></div>
          <label class="check"><input id="c-del-img" type="checkbox">删除当前照片</label>
        `
        : ""
      }

      <input id="c-img" type="file" accept="image/*">
      <button class="btn" onclick="saveCloth()">${edit ? "保存修改" : "保存到衣柜"}</button>
      ${edit ? `<button class="btn secondary" onclick="editingCloth=null;renderWardrobe()">取消编辑</button>` : ""}
    </div>

    <div class="card">
      <div class="row between">
        <h2 style="margin:0">我的衣柜</h2>
        <div>
          <button class="btn secondary" onclick="setView('grid')">宫格</button>
          <button class="btn secondary" onclick="setView('list')">列表</button>
        </div>
      </div>

      <input placeholder="搜索名称、店铺、备注" value="${esc(kw)}" oninput="sessionStorage.setItem('kw',this.value);renderWardrobe()">

      <div class="toolbar">
        ${["全部",...CATS].map(c => `
          <button class="pill ${filter===c ? "active" : ""}" onclick="sessionStorage.setItem('filter_cat','${c}');renderWardrobe()">${c}</button>
        `).join("")}
      </div>

      <div class="small">共 ${clothes.length} 件，当前显示 ${list.length} 件</div>

      ${
        list.length
        ? view === "grid"
          ? `<div class="grid">${list.map(clothGrid).join("")}</div>`
          : list.map(clothList).join("")
        : `<div class="empty">暂无单品</div>`
      }
    </div>
  `;
  fillImages();
}
function clothGrid(c){
  return `
    <div class="item">
      <div class="photo" data-imgkey="${c.imgKey || ""}"></div>
      <div class="body">
        <div class="name">${esc(c.name)}</div>
        <span class="tag">${esc(c.cat)}</span>
        <div>
          <button class="btn secondary" onclick="editingCloth=${c.id};renderWardrobe()">编</button>
          <button class="btn danger" onclick="deleteCloth(${c.id})">删</button>
        </div>
      </div>
    </div>
  `;
}
function clothList(c){
  return `
    <div class="list">
      <div class="thumb photo" data-imgkey="${c.imgKey || ""}"></div>
      <div class="flex">
        <div class="name">${esc(c.name)}</div>
        <span class="tag">${esc(c.cat)}</span>
        <div class="small">¥${c.price || 0} · 已穿 ${wearCount(c.id)} 次</div>
      </div>
      <button class="btn secondary" onclick="editingCloth=${c.id};renderWardrobe()">编辑</button>
      <button class="btn danger" onclick="deleteCloth(${c.id})">删</button>

  `;

async function saveCloth(){
  const name = $("c-name").value.trim();
  if(!name){
    alert("先填名称");
    return;
  }

  const old = clothes.find(c => c.id === editingCloth);
  let imgKey = old?.imgKey || "";

  if($("c-del-img")?.checked){
    delImg(imgKey);
    imgKey = "";
  }

  const file = $("c-img").files[0];
  if(file){
    const data = await compressImage(file);
    if(data){
      imgKey = imgKey || `cloth_${Date.now()}_${Math.random().toString(16).slice(2)}`;
      await putImg(imgKey,data);
    }
  }

  const item = {
    id: old?.id || Date.now(),
    name,
    cat: normalizeCat($("c-cat").value),
    price: Number($("c-price").value || 0),
    date: $("c-date").value,
    shop: $("c-shop").value.trim(),
    note: $("c-note").value.trim(),
    imgKey
  };

  clothes = old ? clothes.map(c => c.id === old.id ? item : c) : [...clothes,item];
  editingCloth = null;
  saveMeta();
  renderWardrobe();
}
function deleteCloth(id){
  if(!confirm("确定删除这件单品吗？相关穿搭和搭配里也会移除它。")) return;
  const c = getCloth(id);
  if(c?.imgKey) delImg(c.imgKey);

  clothes = clothes.filter(c => c.id !== id);
  ootds = ootds.map(o => ({...o,items:o.items.filter(x => x !== id)}));
  outfits = outfits.map(o => ({...o,items:o.items.filter(x => x !== id)}));

  saveMeta();
  render();
}

async function saveOotd(date){
  const selected = [...document.querySelectorAll(".checklist input[type=checkbox]:checked")].map(i => Number(i.value));
  if(!selected.length){
    alert("至少选择一件单品");
    return;
  }
  const old = ootds.find(o => o.date === date);
  let imgKey = old?.imgKey || "";

  if($("o-del-img")?.checked){
    delImg(imgKey);
    imgKey = "";
  }

  const file = $("o-img").files[0];
  if(file){
    const data = await compressImage(file);
    if(data){
      imgKey = imgKey || `ootd_${date}_${Date.now()}`;
      await putImg(imgKey,data);
    }
  }

  const data = {
    date,
    name: $("o-name").value.trim() || "今日汉服穿搭",
    occasion: $("o-occasion").value,
    note: $("o-note").value.trim(),
    items: selected,
    imgKey,
    outfitId: old?.outfitId || null
  };

  ootds = ootds.filter(o => o.date !== date);
  ootds.push(data);
  tab = backTab || "today";
  saveMeta();
  render();
}
function deleteOotd(date){
  if(!confirm("确定删除这天记录吗？")) return;
  const old = ootds.find(o => o.date === date);
  if(old?.imgKey) delImg(old.imgKey);
  ootds = ootds.filter(o => o.date !== date);
  tab = backTab || "today";
  saveMeta();
  render();
}

async function saveOutfit(){

  if(!name){

  }
  const selected = [...document.querySelectorAll(".checklist input[type=checkbox]:checked")].map(i => Number(i.value));
  if(!selected.length){
    alert("至少选择一件单品");
    return;
  }

  const old = outfits.find(o => o.id === editingOutfit);
  let imgKey = old?.imgKey || "";

  if($("f-del-img")?.checked){
    delImg(imgKey);
    imgKey = "";
  }

  const file = $("f-img").files[0];
  if(file){
    const data = await compressImage(file);
    if(data){
      imgKey = imgKey || `outfit_${Date.now()}_${Math.random().toString(16).slice(2)}`;
      await putImg(imgKey,data);
    }
  }

  const data = {

function deleteOutfit(id){
  if(!confirm("确定删除这套搭配吗？")) return;
  const o = getOutfit(id);
  if(o?.imgKey) delImg(o.imgKey);
  outfits = outfits.filter(o => o.id !== id);
  saveMeta();
  renderOutfits();
}
function randomFrom(catName){
  const arr = clothes.filter(c => c.cat === catName);
  if(!arr.length) return null;
  return arr[Math.floor(Math.random()*arr.length)];
}
function randomOutfit(){
  if(!clothes.length){
    alert("衣柜还是空的");
    return;
  }
  const picked = [];
  const top = randomFrom("上衣") || randomFrom("外衫");
  const outer = randomFrom("外衫");
  const cami = Math.random() > 0.5 ? randomFrom("吊带") : null;
  const skirt = randomFrom("裙装");
  const other = Math.random() > 0.6 ? randomFrom("其他") : null;

  [outer,top,cami,skirt,other].forEach(x => {
    if(x && !picked.includes(x.id)) picked.push(x.id);
  });

  if(!picked.length){
    alert("还没有足够的单品可以随机搭配");
    return;
  }

  editingOutfit = null;
  $("f-name").value = "随机搭配";
  $("f-note").value = "由随机搭一套生成";
  document.querySelectorAll(".checklist input[type=checkbox]").forEach(i => {
    i.checked = picked.includes(Number(i.value));
  });
  alert("已随机选择单品，可以调整后保存。");
}

/* 日历 */
function renderCalendar(){
  const y = cal.getFullYear();
  const m = cal.getMonth();
  const first = new Date(y,m,1).getDay();
  const days = new Date(y,m+1,0).getDate();
  const monthKey = `${y}-${String(m+1).padStart(2,"0")}`;

  let html = ["日","一","二","三","四","五","六"].map(d => `<div class="head">${d}</div>`).join("");

  for(let i=0;i<first;i++) html += `<div></div>`;

  for(let d=1; d<=days; d++){
    const k = `${monthKey}-${String(d).padStart(2,"0")}`;
    const o = ootds.find(x => x.date === k);
    html += `
      <div class="day ${o ? "has" : ""} ${k===today ? "today" : ""}" onclick="showOotdForm('${k}','calendar')">
        <div class="day-num">${d}</div>
        <div class="day-img" ${o?.imgKey ? `data-calimg="${o.imgKey}"` : ""}>
          ${o ? esc(o.name.slice(0,2)) : ""}
        </div>
      </div>
    `;
  }

  const records = ootds
    .filter(o => o.date.startsWith(monthKey))
    .sort((a,b) => b.date.localeCompare(a.date));

  $("main").innerHTML = `
    <div class="card">
      <div class="row between">
        <button class="btn secondary" onclick="cal.setMonth(cal.getMonth()-1);renderCalendar()">‹ 上月</button>
        <h2 style="margin:0">${y}年${m+1}月</h2>
        <button class="btn secondary" onclick="cal.setMonth(cal.getMonth()+1);renderCalendar()">下月 ›</button>
      </div>
      <div style="height:10px"></div>
      <div class="calendar">${html}</div>
      <div class="small" style="margin-top:10px">点击日期可以查看、修改或补记当天穿搭。</div>
    </div>

    <div class="card">
      <h2>本月记录</h2>
      ${
        records.length
        ? records.map(ootdCard).join("")
        : `<div class="empty">本月还没有记录</div>`
      }
    </div>
  `;
  fillCalendarImages();
  fillImages();
}

/* 统计与备份 */
async function exportTextBackup(){
  const data = {
    app:"hanfu-ootd",
    version:VERSION,
    type:"text",
    exportedAt:new Date().toISOString(),
    clothes,
    ootds,
    outfits
  };
  downloadJSON(data,`汉服手账文字备份-${today}.json`);
}
async function exportFullBackup(){
  const images = {};
  for(const key of getAllImageKeys()){
    images[key] = await getImg(key);
  }
  const data = {
    app:"hanfu-ootd",
    version:VERSION,
    type:"full",
    exportedAt:new Date().toISOString(),
    clothes,
    ootds,
    outfits,
    images
  };
  downloadJSON(data,`汉服手账完整备份-${today}.json`);
}
function downloadJSON(data,name){
  const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function chooseBackup(){
  $("backup-file").click();
}
async function importBackup(input){
  const file = input.files && input.files[0];
  if(!file) return;

  const text = await file.text();

  try{
    const data = JSON.parse(text);

    const newClothes = Array.isArray(data.clothes) ? data.clothes : [];
    const newOotds = Array.isArray(data.ootds) ? data.ootds : [];
    const newOutfits = Array.isArray(data.outfits) ? data.outfits : [];

    if(!newClothes.length && !newOotds.length && !newOutfits.length){
      alert("这个备份里没有识别到衣柜、穿搭或搭配数据。");
      return;
    }

    if(!confirm("导入会覆盖当前数据。确定继续吗？")) return;

    clothes = newClothes;
    ootds = newOotds;
    outfits = newOutfits;

    normalizeAll();

    if(data.images && typeof data.images === "object"){
      for(const [key,val] of Object.entries(data.images)){
        if(val) await putImg(key,val);
      }
    }

    await migrateInlineImages();

    saveMeta();
    alert("导入成功。");
    render();

  }catch(e){
    alert("导入失败：备份文件格式不正确。");
  }finally{
    input.value = "";
  }
}
function clearAll(){
  if(!confirm("确定清空所有数据吗？建议先导出完整备份。")) return;
  if(!confirm("再次确认：这一步不能撤销。")) return;

  getAllImageKeys().forEach(k => delImg(k));
  clothes = [];
  ootds = [];
  outfits = [];
  saveMeta();
  render();
}

      <input id="backup-file" type="file" accept=".json,application/json" style="display:none" onchange="importBackup(this)">
      <hr>
      <button class="btn danger" onclick="clearAll()">清空全部数据</button>
    </div>

    <div class="card">
      <h2>单品穿着排行</h2>
      ${
        ranked.length
        ? ranked.map(c => {
          const cost = c.count ? Math.round(Number(c.price||0)/c.count) : Number(c.price||0);
          return `
            <div style="padding:9px 0;border-bottom:1px dashed #d8cbb8">
              <div class="row between">
                <div>
                  <div class="name">${esc(c.name)}</div>
                  <div class="small">${esc(c.cat)} · 已穿 ${c.count} 次</div>
                </div>
                <div class="small">单次 ¥${cost}</div>
              </div>
            </div>
          `;
        }).join("")
        : `<div class="empty">暂无数据</div>`
      }
    </div>

    <div class="version">${VERSION}</div>
  `;
}

/* 启动 */
(async function init(){
  await openDB();

  clothes = safeParse(localStorage.getItem(S_C), null);
  if(!Array.isArray(clothes) || !clothes.length){
    clothes = readFirst(LEGACY_C,[]);
  }

  ootds = safeParse(localStorage.getItem(S_O), null);
  if(!Array.isArray(ootds) || !ootds.length){
    ootds = readFirst(LEGACY_O,[]);
  }

  outfits = safeParse(localStorage.getItem(S_F),[]);
  if(!Array.isArray(outfits)) outfits = [];

  normalizeAll();
  await migrateInlineImages();
  saveMeta();
  render();
})();
</script>

<script>
/* ===== v4.1 搭配体验优化补丁 =====

*/

const V41_VERSION = "v4.1-outfit-color";

const COLOR_GROUPS = [

  "黑/灰",
  "红/粉",
  "蓝",
  "绿",
  "黄/棕",
  "紫",

];

let randomPicked = [];
let randomMode = "不限色系";

/* 注入 v4.1 样式 */

function normalizeColor(color){
  return COLOR_GROUPS.includes(color) ? color : "其他";
}

function colorDot(color){
  const map = {
    "白/米":"#eee3d1",
    "黑/灰":"#555555",
    "红/粉":"#d88f9a",
    "蓝":"#7a9ab5",
    "绿":"#8fa99c",
    "黄/棕":"#b9905f",
    "紫":"#a48ab8",
    "其他":"#c8bfb0"
  };
  return map[color] || "#c8bfb0";
}

function normalizeAll(){
  clothes = clothes.map(c => ({
    id: c.id || Date.now() + Math.random(),
    name: c.name || "未命名单品",
    cat: normalizeCat(c.cat),
    color: normalizeColor(c.color),
    price: Number(c.price || 0),
    date: c.date || "",
    shop: c.shop || "",
    note: c.note || "",
    imgKey: c.imgKey || "",
    img: c.img || ""
  }));

  ootds = ootds.map(o => ({
    date: o.date || today,
    name: o.name || "今日汉服穿搭",
    occasion: OCCASIONS.includes(o.occasion) ? o.occasion : "其他",
    note: o.note || "",
    items: Array.isArray(o.items) ? o.items : [],
    imgKey: o.imgKey || "",
    img: o.img || "",
    outfitId: o.outfitId || null
  }));

  outfits = outfits.map(o => ({
    id: o.id || Date.now() + Math.random(),
    name: o.name || "未命名搭配",
    items: Array.isArray(o.items) ? o.items : [],
    note: o.note || "",
    imgKey: o.imgKey || "",
    img: o.img || ""
  }));
}

/* ===== 衣柜：我的衣柜上移，添加单品下移，增加色系 ===== */
function renderWardrobe(){
  const filter = sessionStorage.getItem("filter_cat") || "全部";
  const kw = sessionStorage.getItem("kw") || "";
  const edit = clothes.find(c => c.id === editingCloth);

  const list = clothes.filter(c => {
    const okCat = filter === "全部" || c.cat === filter;
    const text = `${c.name} ${c.cat} ${c.color||""} ${c.shop||""} ${c.note||""}`.toLowerCase();
    return okCat && text.includes(kw.toLowerCase());
  });

  $("main").innerHTML = `
    <div class="card">
      <div class="row between">

        <div>

      <input placeholder="搜索名称、店铺、备注、色系" value="${esc(kw)}" oninput="sessionStorage.setItem('kw',this.value);renderWardrobe()">

        ${["全部",...CATS].map(c => `
          <button class="pill ${filter===c ? "active" : ""}" onclick="sessionStorage.setItem('filter_cat','${c}');renderWardrobe()">${c}</button>

      </div>

      <div class="small">共 ${clothes.length} 件，当前显示 ${list.length} 件</div>

        ? view === "grid"
          ? `<div class="grid">${list.map(clothGrid).join("")}</div>`
          : list.map(clothList).join("")
        : `<div class="empty">暂无单品</div>`
      }

      <h2>${edit ? "编辑单品" : "添加单品"}</h2>
      <input id="c-name" placeholder="名称" value="${esc(edit?.name || "")}">

      <select id="c-cat">
        ${CATS.map(c => `<option ${edit?.cat===c ? "selected" : ""}>${c}</option>`).join("")}
      </select>

      <select id="c-color">
        ${COLOR_GROUPS.map(c => `<option ${normalizeColor(edit?.color)===c ? "selected" : ""}>${c}</option>`).join("")}
      </select>

      <input id="c-price" type="number" placeholder="价格" value="${esc(edit?.price || "")}">
      <input id="c-date" type="date" value="${esc(edit?.date || "")}">

      }

      <button class="btn" onclick="saveCloth()">${edit ? "保存修改" : "保存到衣柜"}</button>

    </div>

}

function clothGrid(c){
  return `
    <div class="item">

        <span class="tag"><span class="color-dot" style="background:${colorDot(c.color)}"></span>${esc(normalizeColor(c.color))}</span>

          <button class="btn secondary" onclick="editingCloth=${c.id};renderWardrobe()">编</button>
          <button class="btn danger" onclick="deleteCloth(${c.id})">删</button>
        </div>
      </div>
    </div>
  `;
}

function clothList(c){
  return `
    <div class="list">
      <div class="thumb photo" data-imgkey="${c.imgKey || ""}"></div>
      <div class="flex">
        <div class="name">${esc(c.name)}</div>
        <span class="tag">${esc(c.cat)}</span>
        <span class="tag"><span class="color-dot" style="background:${colorDot(c.color)}"></span>${esc(normalizeColor(c.color))}</span>
        <div class="small">¥${c.price || 0} · 已穿 ${wearCount(c.id)} 次</div>
      </div>
      <button class="btn secondary" onclick="editingCloth=${c.id};renderWardrobe()">编辑</button>

async function saveCloth(){
  const name = $("c-name").value.trim();
  if(!name){
    alert("先填名称");
    return;
  }

  const old = clothes.find(c => c.id === editingCloth);
  let imgKey = old?.imgKey || "";

  if($("c-del-img")?.checked){
    delImg(imgKey);
    imgKey = "";
  }

  const file = $("c-img").files[0];
  if(file){
    const data = await compressImage(file);
    if(data){
      imgKey = imgKey || `cloth_${Date.now()}_${Math.random().toString(16).slice(2)}`;
      await putImg(imgKey,data);
    }
  }

  const item = {
    id: old?.id || Date.now(),
    name,
    cat: normalizeCat($("c-cat").value),
    color: normalizeColor($("c-color").value),
    price: Number($("c-price").value || 0),
    date: $("c-date").value,
    shop: $("c-shop").value.trim(),
    note: $("c-note").value.trim(),
    imgKey
  };

  clothes = old ? clothes.map(c => c.id === old.id ? item : c) : [...clothes,item];
  editingCloth = null;
  saveMeta();
  renderWardrobe();
}

/* ===== 搭配模块：套装模板上移，一行三个；选单品显示缩略图 ===== */

        <summary>${cat} · ${arr.length}件</summary>

          ${arr.map(c => `
            <div class="select-tile ${selectedIds.includes(c.id) ? "active" : ""}" data-select-id="${c.id}" onclick="toggleSelectTile(this)">

function toggleSelectTile(el){

function getSelectedTiles(){

function renderOutfits(){
  const edit = outfits.find(o => o.id === editingOutfit);

  $("main").innerHTML = `

        ? `<div class="template-grid">${outfits.map(outfitTemplateCard).join("")}</div>`

    <div class="card">

      <select id="random-mode">

          <div class="small">当前封面：</div>

      <input id="f-img" type="file" accept="image/*">
      <button class="btn" onclick="saveOutfit()">${edit ? "保存修改" : "保存搭配"}</button>
      ${edit ? `<button class="btn secondary" onclick="editingOutfit=null;renderOutfits()">取消编辑</button>` : ""}

function outfitTemplateCard(o){
  const names = itemNames(o.items);
  return `
    <div class="template-card">
      <div class="photo" data-imgkey="${o.imgKey || ""}"></div>
      <div class="template-card-body">

        <button class="btn" onclick="useOutfitToday(${o.id})">今日</button>
        <button class="btn secondary" onclick="editingOutfit=${o.id};renderOutfits()">编</button>

async function saveOutfit(){
  const name = $("f-name").value.trim();
  if(!name){
    alert("先填搭配名称");
    return;
  }

  const selected = getSelectedTiles();

  if(!selected.length){
    alert("至少选择一件单品");
    return;
  }

  const old = outfits.find(o => o.id === editingOutfit);
  let imgKey = old?.imgKey || "";

  if($("f-del-img")?.checked){
    delImg(imgKey);
    imgKey = "";
  }

  const file = $("f-img").files[0];
  if(file){
    const data = await compressImage(file);
    if(data){
      imgKey = imgKey || `outfit_${Date.now()}_${Math.random().toString(16).slice(2)}`;
      await putImg(imgKey,data);
    }
  }

  const data = {
    id: old?.id || Date.now(),
    name,
    note: $("f-note").value.trim(),
    items: selected,
    imgKey
  };

  outfits = old ? outfits.map(o => o.id === old.id ? data : o) : [...outfits,data];
  editingOutfit = null;
  saveMeta();
  renderOutfits();
}

/* ===== 随机搭配：色系规则 ===== */
function randomOne(arr){
  if(!arr.length) return null;
  return arr[Math.floor(Math.random() * arr.length)];
}

function compatibleColors(base, mode){
  base = normalizeColor(base);

  if(mode === "不限色系"){
    return COLOR_GROUPS;
  }

  if(mode === "同色系"){
    return [base, "白/米", "黑/灰", "其他"];
  }

  const harmony = {
    "白/米":["白/米","蓝","绿","红/粉","黄/棕"],
    "黑/灰":["黑/灰","白/米","红/粉","蓝","紫"],
    "红/粉":["红/粉","白/米","黑/灰"],
    "蓝":["蓝","白/米","黑/灰"],
    "绿":["绿","白/米","黄/棕"],
    "黄/棕":["黄/棕","白/米","绿"],
    "紫":["紫","白/米","黑/灰"],
    "其他":["其他","白/米","黑/灰"]
  };

  const contrast = {
    "白/米":["蓝","绿","红/粉","黑/灰"],
    "黑/灰":["红/粉","白/米","蓝"],
    "红/粉":["绿","黑/灰","白/米"],
    "蓝":["黄/棕","白/米"],
    "绿":["红/粉","白/米","黄/棕"],
    "黄/棕":["蓝","紫","绿"],
    "紫":["黄/棕","白/米","黑/灰"],
    "其他":["白/米","黑/灰"]
  };

  if(mode === "协调色"){
    return harmony[base] || COLOR_GROUPS;
  }

  if(mode === "撞色"){
    return contrast[base] || COLOR_GROUPS;
  }

  return COLOR_GROUPS;
}

function pickByColor(arr, allowed){
  if(!arr.length) return null;

  const preferred = arr.filter(c => allowed.includes(normalizeColor(c.color)));
  if(preferred.length) return randomOne(preferred);

  return randomOne(arr);
}

function generateRandomOutfit(){
  const mode = $("random-mode") ? $("random-mode").value : "不限色系";
  randomMode = mode;

  const skirts = clothes.filter(c => c.cat === "裙装");
  const camis = clothes.filter(c => c.cat === "吊带");
  const tops = clothes.filter(c => c.cat === "外衫" || c.cat === "上衣");

  if(!skirts.length){
    alert("还没有裙装，无法生成完整搭配。");
    return;
  }

  const skirt = randomOne(skirts);
  const allowed = compatibleColors(skirt.color, mode);

  const top = pickByColor(tops, allowed);
  const cami = pickByColor(camis, allowed);

  randomPicked = [top, cami, skirt].filter(Boolean).map(c => c.id);

  renderRandomResult();
}

function renderRandomResult(){
  const result = $("random-result");
  if(!result) return;

  if(!randomPicked.length){
    result.innerHTML = "";
    return;
  }

  const items = randomPicked.map(id => getCloth(id)).filter(Boolean);

  result.innerHTML = `
    <hr>
    <div class="small">随机结果 · ${esc(randomMode)}</div>
    <div class="random-preview">
      ${items.map(c => `
        <div class="random-card">
          <div class="photo" data-imgkey="${c.imgKey || ""}"></div>
          <div class="random-card-body">
            <div>${esc(c.name)}</div>
            <div style="color:#8f8475">${esc(c.cat)} · ${esc(normalizeColor(c.color))}</div>
          </div>
        </div>
      `).join("")}
    </div>

    <button class="btn" onclick="saveRandomAsOutfit()">保存为搭配</button>
    <button class="btn secondary" onclick="useRandomToday()">用于今日穿搭</button>
  `;

  fillImages();
}

function saveRandomAsOutfit(){
  if(!randomPicked.length){
    alert("请先随机生成一套");
    return;
  }

  const data = {
    id: Date.now(),
    name: "随机搭配",
    note: `由随机搭一套生成 · ${randomMode}`,
    items: [...randomPicked],
    imgKey: ""
  };

  outfits.push(data);
  saveMeta();
  alert("已保存为搭配。");
  renderOutfits();
}

function useRandomToday(){
  if(!randomPicked.length){
    alert("请先随机生成一套");
    return;
  }

  const old = ootds.find(o => o.date === today);

  const data = {
    date: today,
    name: "随机搭配",
    occasion: old?.occasion || "其他",
    note: `由随机搭一套生成 · ${randomMode}`,
    items: [...randomPicked],
    imgKey: old?.imgKey || "",
    outfitId: null
  };

  ootds = ootds.filter(o => o.date !== today);
  ootds.push(data);

  tab = "today";
  saveMeta();
  render();
}
